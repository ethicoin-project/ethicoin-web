<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETHIC | Ethical Human Intelligence Protocol</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0b0e11; --green: #2ecc71; --pink: #ff69b4; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body, html { 
            width: 100%; height: 100%; overflow: hidden; 
            font-family: 'Inter', sans-serif; background: var(--bg); 
        }

        /* ✨ CANLI VE HAREKETLİ NEON ATMOSFER ✨ */
        .neon-space {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; background: #000; overflow: hidden;
        }

        /* Hareket eden ışık küreleri (Video hissi verir) */
        .light-orb {
            position: absolute; width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(46, 204, 113, 0.12) 0%, transparent 70%);
            border-radius: 50%; filter: blur(80px);
            animation: float 25s infinite alternate ease-in-out;
        }
        .orb-2 {
            right: -150px; bottom: -150px;
            background: radial-gradient(circle, rgba(255, 105, 180, 0.12) 0%, transparent 70%);
            animation: float 18s infinite alternate-reverse ease-in-out;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(150px, -100px) scale(1.3); }
        }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.4) 100%);
        }

        /* 🤩 SAĞDAN SOLA PARLAYAN ANA BAŞLIK 🤩 */
        h1 { 
            font-size: clamp(3.5rem, 15vw, 7.5rem); 
            font-weight: 900; letter-spacing: -6px; line-height: 0.9;
            margin: 0; text-transform: uppercase;
            background: linear-gradient(135deg, var(--green), var(--pink)); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
            background-clip: text; color: transparent;
            position: relative;
        }

        h1::after {
            content: "ETHIC";
            position: absolute; left: 0; top: 0; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent 0%, transparent 35%, rgba(255, 255, 255, 0.8) 50%, transparent 65%, transparent 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; background-size: 200% 100%;
            background-position: -150% 0%; 
            animation: lightMove 4s infinite linear;
            filter: blur(2px);
        }

        /* 🤩 SAĞDAN SOLA PARLAYAN SLOGAN 🤩 */
        .tagline { 
            color: #666; font-size: 0.85rem; margin-top: 25px; 
            letter-spacing: 8px; text-transform: uppercase;
            position: relative;
            background: #666;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .tagline::after {
            content: "Ethical Human Intelligence";
            position: absolute; left: 0; top: 0; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent 0%, transparent 35%, rgba(255, 255, 255, 0.6) 50%, transparent 65%, transparent 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; background-size: 200% 100%;
            background-position: -150% 0%; 
            animation: lightMove 4s infinite linear;
        }

        @keyframes lightMove {
            0% { background-position: -150% 0%; }
            100% { background-position: 150% 0%; }
        }

        .btn-container { margin-top: 60px; display: flex; flex-direction: column; gap: 18px; width: 85%; max-width: 320px; z-index: 10; }
        .btn {
            padding: 20px; border-radius: 18px; border: none; font-weight: 700; 
            font-size: 0.95rem; cursor: pointer; text-transform: uppercase; 
            transition: 0.4s; backdrop-filter: blur(15px);
        }
        .btn-primary { background: var(--green); color: #000; box-shadow: 0 10px 30px rgba(46, 204, 113, 0.3); }
        .btn-secondary { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 105, 180, 0.4); color: var(--pink); }
        .btn:hover { transform: translateY(-5px); filter: brightness(1.2); }

        /* MODAL (MANIFESTO) */
        .modal {
            display: none; position: fixed; z-index: 1000; left: 0; top: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.96);
            padding: 20px; backdrop-filter: blur(25px);
        }
        .modal-content {
            background: #11151c; margin: 4% auto; padding: 45px;
            border: 1px solid rgba(46, 204, 113, 0.3); width: 95%; max-width: 700px;
            border-radius: 35px; text-align: left; color: #bbb; line-height: 1.8;
        }
        .close { color: var(--pink); float: right; font-size: 38px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="neon-space">
        <div class="light-orb"></div>
        <div class="light-orb orb-2"></div>
    </div>

    <div class="overlay">
        <h1>ETHIC</h1>
        <div class="tagline">Ethical Human Intelligence</div>
        <div class="btn-container">
            <button id="walletBtn" class="btn btn-primary" onclick="connect()">Connect Wallet</button>
            <button class="btn btn-secondary" onclick="openModal()">The Manifesto</button>
        </div>
    </div>

    <div id="wpModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2 style="color:var(--green); margin-bottom:20px; border-bottom:1px solid #333; padding-bottom:15px;">📜 THE MANIFESTO</h2>
            <p style="font-style:italic; border-left:4px solid var(--pink); padding-left:15px; margin-bottom:20px; color:#eee;">"Data is the new oil... ETHIC returns value to its owners."</p>
            <p><strong>Total Supply:</strong> 1,000,000,000 ETHIC</p>
            <button class="btn btn-primary" style="width:100%; margin-top:30px;" onclick="closeModal()">ENTER PROTOCOL</button>
        </div>
    </div>

    <script>
        async function connect() {
            if (window.ethereum) {
                try {
                    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    document.getElementById('walletBtn').innerText = accounts[0].substring(0, 6) + "..." + accounts[0].slice(-4);
                    document.getElementById('walletBtn').style.background = "#fff";
                } catch (e) { console.log("Rejected"); }
            } else { alert("MetaMask Browser Required!"); }
        }
        function openModal() { document.getElementById("wpModal").style.display = "block"; }
        function closeModal() { document.getElementById("wpModal").style.display = "none"; }
    </script>
</body>
</html>
