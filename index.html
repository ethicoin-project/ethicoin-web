<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETHICOIN | Future of Data Economy</title>
    <style>
        :root { --main-green: #00ff88; --bg-black: #050505; }
        body { background-color: var(--bg-black); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; text-align: center; top: 0 !important; }
        
        /* Çeviri çubuğunu şıklaştırıyoruz */
        #google_translate_element { padding: 10px; }
        .goog-te-banner-frame.skiptranslate { display: none !important; }
        
        nav { padding: 15px 50px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; background: #000; position: sticky; top: 0; z-index: 1000; }
        .logo { font-weight: bold; color: var(--main-green); font-size: 1.5rem; letter-spacing: 2px; }
        .hero { padding: 100px 20px; background: radial-gradient(circle at center, #00ff881a 0%, transparent 70%); }
        h1 { font-size: 3.5rem; margin-bottom: 10px; text-transform: uppercase; }
        .btn { background: var(--main-green); color: black; border: none; padding: 12px 30px; font-weight: bold; border-radius: 50px; cursor: pointer; transition: 0.3s; }
        .btn:hover { transform: scale(1.05); box-shadow: 0 0 20px var(--main-green); }
        .roadmap { padding: 50px; background: #080808; border-radius: 20px; margin: 20px; }
    </style>
</head>
<body>

<nav>
    <div class="logo">ETHICOIN</div>
    
    <div id="google_translate_element"></div>

    <button class="btn" id="connectButton" onclick="connectWallet()">CONNECT WALLET</button>
</nav>

<section class="hero">
    <h1>Building the Data Future</h1>
    <p>Ethicoin is a decentralized blockchain ecosystem designed for secure data mining and ethical AI integration.</p>
</section>

<section class="roadmap">
    <h2>PROJECT ROADMAP</h2>
    <p>🚀 Q1 2026: Global Launch</p>
    <p>🛠️ Q2 2026: AI Integration</p>
    <p>💎 Q3 2026: Major Exchange Listings</p>
</section>

<script type="text/javascript">
function googleTranslateElementInit() {
  new google.translate.TranslateElement({pageLanguage: 'en', layout: google.translate.TranslateElement.InlineLayout.SIMPLE}, 'google_translate_element');
}
</script>
<script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

<script>
    async function connectWallet() {
        if (window.ethereum) {
            const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
            document.getElementById('connectButton').innerText = accounts[0].substring(0, 6) + "...";
        } else {
            alert("Please install MetaMask!");
        }
    }
</script>

</body>
</html>
