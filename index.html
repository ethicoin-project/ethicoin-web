<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETHIC | Ethical Human Intelligence Protocol</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0b0e11; --green: #2ecc71; --pink: #ff69b4; }
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        
        /* Arka plan tamamen sabit ve derin siyah/gri */
        body, html { 
            width: 100%; height: 100%; overflow: hidden; 
            font-family: 'Inter', sans-serif; background: var(--bg); 
        }

        .container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center;
            /* Hafif bir derinlik hissi için sabit gradyan */
            background: radial-gradient(circle at center, #161b22 0%, #0b0e11 100%);
        }

        /* ✨ SAĞDAN SOLA PARLAYAN ANA BAŞLIK ✨ */
        h1 { 
            font-size: clamp(3.5rem, 15vw, 7.5rem); 
            font-weight: 900; letter-spacing: -6px; line-height: 0.9;
            margin: 0; text-transform: uppercase;
            background: linear-gradient(135deg, var(--green), var(--pink)); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
            background-clip: text; color: transparent;
            position: relative;
        }

        h1::after {
            content: "ETHIC";
            position: absolute; left: 0; top: 0; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent 0%, transparent 35%, rgba(255, 255, 255, 0.7) 50%, transparent 65%, transparent 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; background-size: 200% 100%;
            background-position: -150% 0%; 
            animation: lightScan 4s infinite linear;
            filter: blur(2px);
        }

        /* ✨ SAĞDAN SOLA PARLAYAN SLOGAN ✨ */
        .tagline { 
            color: #555; font-size: 0.85rem; margin-top: 25px; 
            letter-spacing: 8px; text-transform: uppercase;
            position: relative;
            background: #555;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .tagline::after {
            content: "Ethical Human Intelligence";
            position: absolute; left: 0; top: 0; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent 0%, transparent 35%, rgba(255, 255, 255, 0.5) 50%, transparent 65%, transparent 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; background-size: 200% 100%;
            background-position: -150% 0%; 
            animation: lightScan 4s infinite linear;
        }

        @keyframes lightScan {
            0% { background-position: -150% 0%; }
            100% { background-position: 150% 0%; }
        }

        .btn-container { margin-top: 60px; display: flex; flex-direction: column; gap: 15px; width: 85%; max-width: 320px; }
        
        .btn {
            padding: 20px; border-radius: 14px; border: none; font-weight: 700; 
            font-size: 0.95rem; cursor: pointer; text-transform: uppercase; 
            transition: 0.3s ease;
        }
        .btn-primary { background: var(--green); color: #000; box-shadow: 0 10px 25px rgba(46, 204, 113, 0.2); }
        .btn-secondary { background: transparent; border: 1px solid #333; color: #888; }
        
        .btn:hover { transform: translateY(-3px); filter: brightness(1.2); }
        .btn-secondary:hover { border-color: var(--pink); color: var(--pink); }

        /* MODAL */
        .modal {
            display: none; position: fixed; z-index: 1000; left: 0; top: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.98);
            padding: 20px; backdrop-filter: blur(10px);
        }
        .modal-content {
            background: #0b0e11; margin: 5% auto; padding: 40px;
            border: 1px solid #333; width: 95%; max-width: 650px;
            border-radius: 20px; text-align: left; color: #999; line-height: 1.8;
        }
        .close { color: var(--pink); float: right; font-size: 30px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="container">
        <h1>ETHIC</h1>
        <div class="tagline">Ethical Human Intelligence</div>

        <div class="btn-container">
            <button id="walletBtn" class="btn btn-primary" onclick="connect()">Connect Wallet</button>
            <button class="btn btn-secondary" onclick="openModal()">The Manifesto</button>
        </div>
    </div>

    <div id="wpModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2 style="color:var(--green); margin-bottom:15px;">📜 THE MANIFESTO</h2>
            <p style="border-left:3px solid var(--pink); padding-left:15px; margin-bottom:20px; font-style:italic;">
                "Data is the new oil... ETHIC returns value to its owners."
            </p>
            <p><strong>Total Supply:</strong> 1,000,000,000 ETHIC</p>
            <button class="btn btn-primary" style="width:100%; margin-top:20px;" onclick="closeModal()">CLOSE</button>
        </div>
    </div>

    <script>
        async function connect() {
            if (window.ethereum) {
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                document.getElementById('walletBtn').innerText = accounts[0].substring(0, 6) + "..." + accounts[0].slice(-4);
                document.getElementById('walletBtn').style.background = "#fff";
            } else { alert("MetaMask required!"); }
        }
        function openModal() { document.getElementById("wpModal").style.display = "block"; }
        function closeModal() { document.getElementById("wpModal").style.display = "none"; }
    </script>
</body>
</html>
