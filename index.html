<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ETHICOIN — Data Sovereignty Protocol</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* --- CORE SIBERPUNK ENGINE --- */
:root {
  --bg: #03050e; --bg2: #070b17; --cyan: #00d4e8; --cyan2: #00f0ff;
  --purple: #6b4fff; --purple2: #9d87ff; --green2: #00e676; --gold: #c8a84b;
  --text: #cce8f4; --text2: #7a9ab8; --border: rgba(0,212,232,0.08);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { 
    background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; 
    overflow-x: hidden; min-height: 100vh; line-height: 1.5;
}

/* BG ANIMATIONS */
.bg-sweep { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
.bg-sweep::before {
    content: ''; position: absolute; width: 200%; height: 200%; top: -50%; left: -150%;
    background: linear-gradient(105deg, transparent 35%, rgba(0,212,232,0.02) 40%, rgba(107,79,255,0.02) 47%);
    animation: sweep 12s ease-in-out infinite;
}
@keyframes sweep { 0% { transform: translateX(0); } 100% { transform: translateX(120%); } }

/* NAVIGATION */
nav {
    position: fixed; top: 0; width: 100%; height: 68px; z-index: 1000;
    display: flex; align-items: center; justify-content: space-between; padding: 0 5%;
    background: rgba(3,5,14,0.85); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border);
}
.nav-logo { font-weight: 800; letter-spacing: 5px; color: var(--cyan); text-shadow: 0 0 10px var(--cyan); }

/* WRAPPER & SECTIONS */
.wrapper { position: relative; z-index: 10; max-width: 1000px; margin: 0 auto; padding: 100px 5%; }
.hero { text-align: center; padding: 60px 0; }
.hero-title { font-size: clamp(2.5rem, 8vw, 5rem); font-weight: 800; line-height: 1; letter-spacing: -2px; margin-bottom: 20px; }
.t1 { color: var(--cyan); } .t2 { color: var(--purple2); }

/* CARDS & PANELS */
.card {
    background: rgba(7, 11, 23, 0.95); border: 1px solid var(--border);
    border-radius: 16px; padding: 24px; margin-bottom: 40px; transition: 0.3s;
}
.card:hover { border-color: rgba(0, 212, 232, 0.3); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

/* TERMINAL MONITOR */
.term-body {
    background: #000; font-family: 'JetBrains Mono', monospace; font-size: 11px;
    height: 200px; padding: 15px; overflow-y: hidden; border-radius: 8px; line-height: 1.8;
}
.lc { color: var(--cyan); } .lg { color: var(--green2); } .lp { color: var(--purple2); }

/* INPUTS & BUTTONS */
.query-input {
    width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--border);
    padding: 15px; color: var(--cyan); font-family: 'JetBrains Mono'; border-radius: 8px; outline: none;
}
.btn-primary {
    background: linear-gradient(135deg, rgba(0,212,232,0.1), rgba(107,79,255,0.1));
    border: 1px solid var(--cyan); color: var(--cyan); padding: 12px 24px;
    cursor: pointer; font-family: 'JetBrains Mono'; font-size: 10px; letter-spacing: 2px;
}
</style>
</head>
<body>

<div class="bg-sweep"></div>

<nav>
    <div class="nav-logo">ETHICOIN</div>
    <div style="display:flex; gap:15px;">
        <button onclick="toggleLang()" class="btn-primary" id="langBtn">🌐 EN</button>
        <div id="langDropdown" style="display:none; position:absolute; top:70px; right:5%; background:var(--bg2); border:1px solid var(--border); z-index:2000;">
            <div onclick="setLang('en')" style="padding:10px 20px; cursor:pointer;">English</div>
            <div onclick="setLang('tr')" style="padding:10px 20px; cursor:pointer;">Türkçe</div>
        </div>
    </div>
</nav>

<div class="wrapper">
    <section class="hero">
        <h1 class="hero-title"><span class="t1" data-i18n="hero_t1">DATA</span> <span class="t2" data-i18n="hero_t2">SOVEREIGNTY</span></h1>
        <p class="hero-sub" data-i18n="hero_sub">Decentralized protocol for ethical AI and data ownership.</p>
    </section>

    <div class="card" id="priceTicker">
        <div style="font-family: 'JetBrains Mono'; font-size: 9px; color: var(--text2);" data-i18n="price_label">ETHIC PRICE</div>
        <div id="priceVal" style="font-size: 2.5rem; font-weight: 800; color: var(--cyan);">$0.00000000</div>
        <div id="priceRefresh" style="font-size: 9px; opacity: 0.5;">Updated: Just now</div>
    </div>

    <section class="section" id="query">
        <h2 style="font-size: 12px; letter-spacing: 3px; color: var(--purple2); margin-bottom: 15px;" data-i18n="sec_wallet">WALLET QUERY</h2>
        <div class="card">
            <div style="display:flex; gap:10px;">
                <input class="query-input" id="walletAddr" placeholder="0x..." data-i18n-placeholder="wallet_placeholder">
                <button class="btn-primary" onclick="queryBalance()" data-i18n="btn_query">QUERY</button>
            </div>
            <div id="resultPanel" style="margin-top:20px; min-height: 50px;"></div>
        </div>
    </section>

    <section class="section">
        <h2 style="font-size: 12px; letter-spacing: 3px; color: var(--cyan); margin-bottom: 15px;" data-i18n="sec_monitor">CHAIN MONITOR</h2>
        <div class="card">
            <div class="term-body" id="termBody"></div>
        </div>
    </section>

    <section class="section" id="roadmap">
        <h2 style="font-size: 12px; letter-spacing: 3px; color: var(--gold); margin-bottom: 15px;" data-i18n="sec_roadmap">ROADMAP</h2>
        <div class="card" style="border-left: 2px solid var(--green2);">
            <div style="font-size: 10px; color: var(--green2);">PHASE I — FOUNDATION</div>
            <h3 data-i18n="phase1_title">Protocol Launch</h3>
            <p style="font-size: 12px; color: var(--text2);" data-i18n="phase1_desc">ERC-20 token deployed and verified on Base Mainnet.</p>
        </div>
    </section>
</div>

<script>
/* --- DATA & LOGIC --- */
const CONTRACT = '0x7eD8CFf2A123F38EEA725FD55CcAA69DD87FFe93';
const API_KEY = 'YOUR_BASESCAN_API_KEY'; // Buraya kendi anahtarını yapıştır

const T = {
    en: {
        hero_t1: "DATA", hero_t2: "SOVEREIGNTY", hero_sub: "Decentralized protocol for ethical AI and data ownership.",
        price_label: "ETHIC PRICE", sec_wallet: "WALLET QUERY", wallet_placeholder: "Enter Base wallet address — 0x...",
        btn_query: "QUERY", sec_monitor: "CHAIN MONITOR", sec_roadmap: "ROADMAP",
        phase1_title: "Protocol Launch", phase1_desc: "ERC-20 token deployed and verified on Base Mainnet."
    },
    tr: {
        hero_t1: "VERİ", hero_t2: "EGEMENLİĞİ", hero_sub: "Etik yapay zeka ve veri sahipliği için merkeziyetsiz protokol.",
        price_label: "ETHIC FİYATI", sec_wallet: "CÜZDAN SORGULAMA", wallet_placeholder: "Base cüzdan adresi girin — 0x...",
        btn_query: "SORGULA", sec_monitor: "ZİNCİR MONİTÖRÜ", sec_roadmap: "YOL HARİTASI",
        phase1_title: "Protokol Lansmanı", phase1_desc: "ERC-20 token Base Mainnet üzerinde yayına alındı."
    }
};

let currentLang = 'en';

/* FUNCTIONS */
function toggleLang() {
    const dd = document.getElementById('langDropdown');
    dd.style.display = dd.style.display === 'none' ? 'block' : 'none';
}

function setLang(lang) {
    currentLang = lang;
    document.querySelectorAll('[data-i18n]').forEach(el => {
        const k = el.getAttribute('data-i18n');
        el.innerHTML = T[lang][k];
    });
    document.getElementById('langBtn').innerText = `🌐 ${lang.toUpperCase()}`;
    toggleLang();
}

async function fetchPrice() {
    try {
        const r = await fetch(`https://api.dexscreener.com/latest/dex/tokens/${CONTRACT}`);
        const d = await r.json();
        const price = d.pairs[0].priceUsd;
        document.getElementById('priceVal').innerText = `$${parseFloat(price).toFixed(10)}`;
    } catch(e) { console.log("Price fetch error"); }
}

function addLog(cls, msg) {
    const body = document.getElementById('termBody');
    const div = document.createElement('div');
    div.className = cls;
    div.innerHTML = `> [${new Date().toLocaleTimeString()}] ${msg}`;
    body.appendChild(div);
    if(body.children.length > 8) body.removeChild(body.firstChild);
}

// Cüzdan Sorgu Mantığı (Düzeltildi)
async function queryBalance() {
    const addr = document.getElementById('walletAddr').value;
    const panel = document.getElementById('resultPanel');
    if(!addr.startsWith('0x') || addr.length !== 42) {
        panel.innerHTML = "<span style='color:red;'>INVALID ADDRESS</span>";
        return;
    }
    panel.innerHTML = "<span class='lc'>SCANNING...</span>";
    try {
        const r = await fetch(`https://api.basescan.org/api?module=account&action=tokenbalance&contractaddress=${CONTRACT}&address=${addr}&tag=latest&apikey=${API_KEY}`);
        const d = await r.json();
        const bal = (parseInt(d.result) / 10**18).toLocaleString();
        panel.innerHTML = `<div style='font-size:20px; color:var(--cyan);'>${bal} ETHIC</div>`;
        addLog('lg', `Balance queried for ${addr.slice(0,6)}...`);
    } catch(e) { panel.innerHTML = "API ERROR"; }
}

/* INITIALIZE */
setInterval(fetchPrice, 15000);
fetchPrice();
setInterval(() => addLog('lc', 'Syncing with Base Mainnet node...'), 10000);
addLog('lg', 'ETHICOIN Protocol Interface v1.0.4 Online');
</script>
</body>
</html>
