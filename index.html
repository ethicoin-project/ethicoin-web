<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETHICOIN | Data Economy</title>
    <style>
        body { background-color: #050505; color: #00ff88; font-family: 'Courier New', monospace; margin: 0; text-align: center; }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; border-bottom: 1px dashed #222; }
        .logo { font-weight: bold; font-size: 1.4rem; letter-spacing: 3px; }
        
        /* Çeviri Menüsünü Sadeleştirme */
        #google_translate_element { margin-right: 15px; }
        .goog-te-gadget-simple { background-color: transparent !important; border: 1px solid #333 !important; padding: 5px !important; border-radius: 5px !important; }
        .goog-te-gadget-simple span { color: #00ff88 !important; }
        
        .hero { padding: 120px 20px; }
        h1 { font-size: 4rem; margin: 0; text-shadow: 0 0 15px #00ff88; }
        p { color: #888; font-size: 1.1rem; margin-top: 10px; }
        
        .btn { background: transparent; border: 2px solid #00ff88; color: #00ff88; padding: 12px 30px; font-weight: bold; border-radius: 5px; cursor: pointer; transition: 0.3s; margin-top: 30px; }
        .btn:hover { background: #00ff88; color: #000; box-shadow: 0 0 30px #00ff88; }
        
        .footer { margin-top: 100px; font-size: 0.8rem; color: #333; }
    </style>
</head>
<body>

<nav>
    <div class="logo">ETHICOIN</div>
    <div style="display: flex; align-items: center;">
        <div id="google_translate_element"></div>
        <button class="btn" id="connectBtn" onclick="connect()" style="margin-top:0">CONNECT</button>
    </div>
</nav>

<section class="hero">
    <h1>ETHICOIN</h1>
    <p>> Future of Decentralized Data Mining</p>
    <p>> System Status: Online</p>
    <button class="btn" onclick="connect()">LAUNCH APP</button>
</section>

<div class="footer">© 2026 ethicoin.biz - Global Data Protocol</div>

<script type="text/javascript">
function googleTranslateElementInit() {
  new google.translate.TranslateElement({pageLanguage: 'en', includedLanguages: 'tr,en,de,fr,es,zh-CN', layout: google.translate.TranslateElement.InlineLayout.SIMPLE}, 'google_translate_element');
}
</script>
<script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

<script>
    async function connect() {
        if (window.ethereum) {
            const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
            document.getElementById('connectBtn').innerText = accounts[0].substring(0, 6).toUpperCase();
            alert("SECURE CONNECTION ESTABLISHED");
        } else {
            alert("Wallet not detected.");
        }
    }
</script>

</body>
</html>
