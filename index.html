<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETHICOIN | Professional Web3</title>
    <style>
        :root { --bg: #0b0e11; --green: #2ecc71; --pink: #ff69b4; }
        body { background-color: var(--bg); color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 50px 20px; }
        h1 { font-size: 3.5rem; background: linear-gradient(to right, var(--green), var(--pink)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .btn { padding: 15px 30px; border-radius: 50px; border: none; font-weight: bold; cursor: pointer; font-size: 1.1rem; transition: 0.3s; width: 100%; max-width: 300px; margin: 10px auto; display: block; }
        .btn-green { background-color: var(--green); color: black; }
        .btn-outline { background: transparent; border: 2px solid var(--pink); color: var(--pink); }
        .card { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; margin-top: 30px; border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>
    <h1>ETHICOIN</h1>
    <p style="color: #a0a0a0;">Decentralized Intelligence Protocol</p>

    <button id="walletBtn" class="btn btn-green" onclick="connect()">Connect Wallet</button>
    <button class="btn btn-outline" onclick="alert('Whitepaper is loading...')">Whitepaper</button>

    <div class="card">
        <h3 style="color: var(--green); margin:0;">Project Status</h3>
        <p id="statusText">Network: BSC/ETH | Status: Waiting Connection</p>
    </div>

    <script>
        async function connect() {
            if (window.ethereum) {
                try {
                    // Bağlantı isteği gönder
                    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    const account = accounts[0];
                    
                    // Butonu ve durumu güncelle
                    const btn = document.getElementById('walletBtn');
                    const status = document.getElementById('statusText');
                    
                    btn.innerText = "Connected: " + account.substring(0, 6) + "..." + account.substring(account.length - 4);
                    btn.style.backgroundColor = "white";
                    btn.style.color = "black";
                    status.innerText = "Wallet: " + account + " | Status: Active";
                    
                    console.log("Bağlantı Başarılı!");
                } catch (error) {
                    alert("Connection rejected by user.");
                }
            } else {
                alert("Please open this site inside MetaMask Browser!");
            }
        }
    </script>
</body>
</html>
