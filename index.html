<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETHIC | Ethical Human Intelligence Protocol</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0b0e11; --green: #2ecc71; --pink: #ff69b4; --white: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        
        body, html { 
            width: 100%; height: 100%; overflow: hidden; 
            font-family: 'Inter', sans-serif; background: var(--bg); 
        }

        /* 1. KATMAN: NEON ATMOSFER */
        .atmosphere {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2;
            background: 
                radial-gradient(circle at 10% 20%, rgba(46, 204, 113, 0.18), transparent 45%),
                radial-gradient(circle at 90% 80%, rgba(255, 105, 180, 0.18), transparent 45%);
            animation: pulseBg 10s infinite alternate ease-in-out;
        }

        @keyframes pulseBg { 0% { opacity: 0.6; transform: scale(1); } 100% { opacity: 1; transform: scale(1.1); } }

        /* 2. KATMAN: ARKA PLAN VİDEOSU */
        #bg-video {
            position: fixed; right: 0; bottom: 0; min-width: 100%; min-height: 100%;
            z-index: -1; object-fit: cover; filter: brightness(0.28) contrast(1.15);
            opacity: 0; transition: opacity 2.5s ease;
        }

        /* 3. KATMAN: ANA İÇERİK */
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; background: rgba(0,0,0,0.15);
        }

        /* ✨ PARLAYAN ETHIC YAZISI ✨ */
        h1 { 
            font-size: clamp(3.5rem, 15vw, 7.5rem); 
            font-weight: 900; letter-spacing: -6px; line-height: 0.9;
            margin: 0; text-transform: uppercase;
            background: linear-gradient(135deg, var(--green), var(--pink)); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
            background-clip: text; color: transparent;
            position: relative;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.4));
        }

        /* Soldan sağa kayan ışık efekti */
        h1::after {
            content: "ETHIC";
            position: absolute; left: 0; top: 0; width: 100%; height: 100%;
            background: linear-gradient(to right, transparent 0%, transparent 40%, #ffffff 50%, transparent 60%, transparent 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
            background-size: 200% 100%;
            background-position: -200% 0%;
            animation: waveGlow 4s infinite linear;
            filter: blur(2px);
        }

        @keyframes waveGlow {
            0% { background-position: -200% 0%; }
            100% { background-position: 200% 0%; }
        }

        .tagline { color: #777; font-size: 0.85rem; margin-top: 20px; letter-spacing: 7px; text-transform: uppercase; }

        .btn-container { margin-top: 60px; display: flex; flex-direction: column; gap: 15px; width: 85%; max-width: 320px; z-index: 10; }
        
        .btn {
            padding: 20px; border-radius: 16px; border: none; font-weight: 700; 
            font-size: 0.95rem; cursor: pointer; text-transform: uppercase; 
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            backdrop-filter: blur(8px);
        }
        .btn-primary { background: var(--green); color: #000; box-shadow: 0 15px 30px rgba(46, 204, 113, 0.25); }
        .btn-secondary { background: rgba(255, 255, 255, 0.03); border: 2px solid var(--pink); color: var(--pink); }
        .btn:hover { transform: translateY(-7px); filter: brightness(1.2); }

        /* MODAL */
        .modal {
            display: none; position: fixed; z-index: 1000; left: 0; top: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.96);
            padding: 20px; backdrop-filter: blur(20px);
        }
        .modal-content {
            background: #11151c; margin: 4% auto; padding: 45px;
            border: 1px solid rgba(46, 204, 113, 0.25); width: 95%; max-width: 720px;
            border-radius: 35px; text-align: left; color: #bbb;
        }
        .close { color: var(--pink); float: right; font-size: 38px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="atmosphere"></div>

    <video autoplay muted loop playsinline id="bg-video" oncanplay="this.style.opacity=1">
        <source src="background.mp4" type="video/mp4">
    </video>

    <div class="overlay">
        <h1>ETHIC</h1>
        <div class="tagline">Ethical Human Intelligence</div>
        <div class="btn-container">
            <button id="walletBtn" class="btn btn-primary" onclick="connect()">Connect Wallet</button>
            <button class="btn btn-secondary" onclick="openModal()">The Manifesto</button>
        </div>
    </div>

    <div id="wpModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2 style="color:var(--green); margin-bottom:20px;">📜 THE MANIFESTO</h2>
            <p style="font-style:italic; border-left:4px solid var(--pink); padding-left:15px; margin-bottom:20px;">"Data is the new oil... ETHIC returns value to its owners."</p>
            <p><strong>Supply:</strong> 1,000,000,000 ETHIC</p>
            <button class="btn btn-primary" style="width:100%; margin-top:30px;" onclick="closeModal()">BACK</button>
        </div>
    </div>

    <script>
        async function connect() {
            if (window.ethereum) {
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                document.getElementById('walletBtn').innerText = accounts[0].substring(0, 6) + "..." + accounts[0].slice(-4);
                document.getElementById('walletBtn').style.background = "white";
            } else { alert("MetaMask required!"); }
        }
        function openModal() { document.getElementById("wpModal").style.display = "block"; }
        function closeModal() { document.getElementById("wpModal").style.display = "none"; }
    </script>
</body>
</html>
