<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETHIC | Fair Data Ownership Protocol</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #030508;
            --green: #2ecc71;
            --pink: #ff69b4;
            --text-dim: #888;
            --glass: rgba(255, 255, 255, 0.03);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { 
            width: 100%; height: 100%; 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg); 
            color: white; 
            overflow: hidden;
        }

        /* 🌌 BACKGROUND GLOWS */
        .glow-bg {
            position: fixed; inset: 0; z-index: -1;
            background: 
                radial-gradient(circle at 20% 40%, rgba(255, 105, 180, 0.12) 0%, transparent 40%),
                radial-gradient(circle at 80% 40%, rgba(46, 204, 113, 0.12) 0%, transparent 40%);
        }

        /* 🚀 NAV */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 30px 60px; position: fixed; width: 100%; top: 0;
            z-index: 100;
        }
        .logo-group { display: flex; align-items: center; gap: 12px; }
        .logo-box {
            width: 32px; height: 32px;
            border: 2px solid var(--pink);
            display: flex; align-items: center; justify-content: center;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            box-shadow: 0 0 15px var(--pink);
        }
        .logo-text { font-weight: 900; font-size: 1.6rem; letter-spacing: 2px; color: white; text-decoration: none;}

        .nav-links { display: flex; gap: 45px; }
        .nav-item { 
            color: var(--text-dim); text-decoration: none; font-size: 0.85rem; 
            font-weight: 600; transition: 0.3s;
        }
        .nav-item:hover, .nav-item.active { color: white; }
        .nav-item.active { color: var(--green); position: relative; }
        .nav-item.active::after {
            content: ''; position: absolute; bottom: -12px; left: 0; 
            width: 100%; height: 2px; background: var(--green);
            box-shadow: 0 0 15px var(--green);
        }

        /* 🛡️ HERO CONTENT */
        .hero {
            height: 100vh; display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center;
            position: relative;
        }

        /* Brain/Shield Visual Area */
        .visual-container {
            position: relative; width: 650px; height: 450px;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: -50px;
        }
        .brain-overlay {
            width: 100%; height: 100%;
            opacity: 0.5;
            filter: drop-shadow(0 0 20px rgba(46, 204, 113, 0.3));
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" stroke="%232ecc71" fill="none" stroke-width="0.2"><circle cx="50" cy="50" r="40"/><path d="M50 10v80M10 50h80"/></svg>'); /* Placeholder brain grid */
            background-size: contain; background-repeat: no-repeat;
        }
        .shield-icon {
            position: absolute; width: 120px;
            filter: drop-shadow(0 0 25px var(--pink));
        }

        /* Typography */
        h1 { 
            font-size: 8rem; font-weight: 900; letter-spacing: -6px; 
            line-height: 1; margin-bottom: 15px;
            background: linear-gradient(to right, var(--green), #fff, var(--pink));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
