<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>ETHICOIN — Ultimate Data Protocol</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #03050e; --cyan: #00d4e8; --purple: #6b4fff; --green: #00e676;
            --text: #cce8f4; --border: rgba(0,212,232,0.15);
        }
        
        /* --- CYBERPUNK ANIMATIONS (SATIRLARI DOLDURAN GÖRSELLİK) --- */
        @keyframes scanline { 0% { bottom: 100%; } 80% { bottom: 100%; } 100% { bottom: 0%; } }
        @keyframes glitch { 
            0% { transform: translate(0); } 20% { transform: translate(-2px, 2px); } 
            40% { transform: translate(-2px, -2px); } 60% { transform: translate(2px, 2px); } 
            80% { transform: translate(2px, -2px); } 100% { transform: translate(0); } 
        }

        body { 
            background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; 
            margin: 0; overflow-x: hidden;
        }

        /* Arka Plan Efekti */
        body::before {
            content: " "; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2; background-size: 100% 2px, 3px 100%; pointer-events: none;
        }

        /* --- NAV & LAYOUT --- */
        nav { 
            display: flex; justify-content: space-between; padding: 20px 5%; 
            backdrop-filter: blur(15px); border-bottom: 1px solid var(--border);
            position: fixed; width: 100%; top: 0; z-index: 100; box-sizing: border-box;
        }

        .hero { text-align: center; padding: 150px 5% 100px; position: relative; }
        .hero h1 { font-size: clamp(3rem, 10vw, 7rem); margin: 0; line-height: 0.9; letter-spacing: -4px; animation: glitch 1s infinite alternate; }
        
        /* --- DYNAMIC CARDS --- */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; padding: 0 5% 100px; }
        .card { 
            background: rgba(7,11,23,0.6); border: 1px solid var(--border); padding: 30px;
            position: relative; overflow: hidden; transition: 0.3s;
        }
        .card:hover { border-color: var(--cyan); box-shadow: 0 0 30px rgba(0, 212, 232, 0.2); transform: translateY(-5px); }

        /* --- TERMINAL MONITOR --- */
        #monitor { 
            background: #000; font-family: 'JetBrains Mono', monospace; padding: 20px; 
            font-size: 12px; height: 200px; overflow-y: auto; border: 1px solid var(--purple);
            margin-top: 20px; color: var(--cyan);
        }

        /* --- BUTTONS --- */
        .btn { 
            display: inline-block; padding: 15px 40px; border: 1px solid var(--cyan); 
            color: var(--cyan); text-decoration: none; font-weight: bold; font-family: 'JetBrains Mono';
            margin-top: 20px; transition: 0.3s; cursor: pointer; background: transparent;
        }
        .btn:hover { background: var(--cyan); color: #000; box-shadow: 0 0 20px var(--cyan); }

        .lang-select { background: none; border: 1px solid var(--border); color: var(--cyan); padding: 5px; }

    </style>
</head>
<body>

<nav>
    <div style="font-weight: 800; letter-spacing: 3px;">ETHICOIN PROTOCOL</div>
    <div>
        <select class="lang-select" onchange="changeLang(this.value)">
            <option value="en">EN</option>
            <option value="tr">TR</option>
            <option value="ru">RU</option>
            <option value="zh">ZH</option>
        </select>
    </div>
</nav>

<section class="hero">
    <h1 data-i18n="h_title">DATA<br><span style="color:var(--purple)">SOVEREIGNTY</span></h1>
    <p data-i18n="h_sub" style="max-width: 600px; margin: 20px auto; color: var(--text2);">The fair protocol for the next generation of AI training.</p>
    <div id="priceDisplay" style="font-family: 'JetBrains Mono'; color: var(--green); font-size: 1.5rem;">$0.00000000</div>
</section>

<div class="grid">
    <div class="card">
        <h2 data-i18n="q_title">WALLET QUERY</h2>
        <input type="text" id="walletInput" placeholder="0x..." style="width:100%; background:none; border:1px solid var(--border); color:white; padding:10px; margin-bottom:10px;">
        <button class="btn" onclick="checkBalance()" style="width:100%" data-i18n="q_btn">SCAN BLOCKCHAIN</button>
        <div id="balanceResult" style="margin-top:15px; font-family: 'JetBrains Mono';"></div>
    </div>

    <div class="card" style="grid-column: span 2;">
        <h2 data-i18n="m_title">LIVE CHAIN MONITOR</h2>
        <div id="monitor">
            > INITIALIZING ETHIC PROTOCOL...<br>
            > STANDBY FOR REAL-TIME DATA...
        </div>
    </div>
</div>

<script>
    const API_KEY = 'YOUR_API_KEY_HERE'; // BaseScan'den aldığın anahtar
    const CONTRACT = '0x7eD8CFf2A123F38EEA725FD55CcAA69DD87FFe93';

    // ÇOK DİLLİ YAPI (CLAUDE'UN YAPTIĞI GİBİ DETAYLANDIRILDI)
    const T = {
        tr: { h_title: "VERİ EGEMENLİĞİ", h_sub: "Yeni nesil yapay zeka eğitimi için adil protokol.", q_title: "CÜZDAN SORGULA", q_btn: "ZİNCİRİ TARA", m_title: "CANLI İZLEME" },
        en: { h_title: "DATA SOVEREIGNTY", h_sub: "The fair protocol for the next generation of AI training.", q_title: "WALLET QUERY", q_btn: "SCAN BLOCKCHAIN", m_title: "LIVE MONITOR" },
        ru: { h_title: "СУВЕРЕНИТЕТ ДАННЫХ", h_sub: "Протокол для обучения ИИ нового поколения.", q_title: "ЗАПРОС КОШЕЛЬКА", q_btn: "СКАННИРОВАТЬ", m_title: "МОНИТОРИНГ" },
        zh: { h_title: "数据主权", h_sub: "下一代人工智能训练的公平协议。", q_title: "钱包查询", q_btn: "扫描区块链", m_title: "实时监控" }
    };

    function changeLang(lang) {
        document.querySelectorAll('[data-i18n]').forEach(el => {
            el.innerText = T[lang][el.getAttribute('data-i18n')];
        });
    }

    // CANLI FİYAT ÇEKME (DEXSCREENER API)
    async function getPrice() {
        try {
            const r = await fetch(`https://api.dexscreener.com/latest/dex/tokens/${CONTRACT}`);
            const d = await r.json();
            const price = d.pairs[0].priceUsd;
            document.getElementById('priceDisplay').innerText = `$${parseFloat(price).toFixed(10)}`;
        } catch (e) { console.log("Price fetch error"); }
    }
    setInterval(getPrice, 10000);

    // GERÇEK ZAMANLI LOG SİSTEMİ
    function addLog(msg) {
        const m = document.getElementById('monitor');
        const time = new Date().toLocaleTimeString();
        m.innerHTML += `<br> <span style="color:var(--purple)">[${time}]</span> > ${msg}`;
        m.scrollTop = m.scrollHeight;
    }

    // Blok İzleyici Simülasyonu (API ile gerçek veri çekilebilir)
    setInterval(() => {
        addLog(`Verifying transaction on Base Mainnet...`);
    }, 8000);

    async function checkBalance() {
        const addr = document.getElementById('walletInput').value;
        if(!addr.startsWith('0x')) return alert("Geçersiz Adres!");
        addLog(`Querying balance for: ${addr.slice(0,6)}...`);
        // API kodun buraya gelecek
    }

</script>
</body>
</html>
