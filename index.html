    <style>
        :root { --bg: #030508; --green: #2ecc71; --pink: #ff69b4; --text: #888; }
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        body, html { width: 100%; height: 100%; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }

        /* 🌌 PARÇACIK ARKA PLANI */
        #canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.6; }

        /* 🚀 NAV & LOGO */
        nav { display: flex; flex-direction: column; align-items: center; padding: 15px 5%; position: fixed; width: 100%; top: 0; backdrop-filter: blur(25px); border-bottom: 1px solid rgba(255,255,255,0.05); z-index: 1000; }
        .logo { font-weight: 900; font-size: 1.3rem; letter-spacing: 4px; color: var(--green); text-decoration: none; margin-bottom: 12px; }
        .nav-links { display: flex; gap: 30px; justify-content: center; width: 100%; }
        .nav-item { position: relative; color: #444; text-decoration: none; font-size: 0.75rem; font-weight: 900; text-transform: uppercase; cursor: pointer; background: #444; -webkit-background-clip: text; -webkit-text-fill-color: transparent; white-space: nowrap; transition: 0.3s; }
        .nav-item.active { color: var(--pink); background: var(--pink); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 8px var(--pink)); }

        .nav-item::after, h1::after { content: attr(data-text); position: absolute; left: 0; top: 0; width: 100%; height: 100%; background: linear-gradient(90deg, transparent 0%, transparent 40%, rgba(255, 255, 255, 0.4) 50%, transparent 60%, transparent 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-size: 200% 100%; background-position: -150% 0%; animation: lightScan 5s infinite linear; }
        @keyframes lightScan { 0% { background-position: -150% 0%; } 100% { background-position: 150% 0%; } }

        /* MAIN HERO */
        .container { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 150px 20px 100px 20px; }
        h1 { font-size: clamp(3.5rem, 15vw, 8.5rem); font-weight: 900; letter-spacing: -7px; line-height: 0.85; background: linear-gradient(135deg, var(--green), var(--pink)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; color: transparent; position: relative; margin-bottom: 15px; }
        .tagline { color: #555; font-size: 0.9rem; letter-spacing: 6px; text-transform: uppercase; font-weight: 700; }

        /* 📟 CANLI İŞLEM TERMİNALİ (SOL ALT) */
        .terminal { position: fixed; bottom: 30px; left: 20px; width: 220px; height: 140px; background: rgba(0,0,0,0.6); border-radius: 12px; border: 1px solid #1a1a1a; padding: 12px; font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; color: var(--green); overflow: hidden; display: flex; flex-direction: column-reverse; pointer-events: none; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        .terminal span { margin-bottom: 4px; opacity: 0.9; }

        /* 🛡️ GÜVENLİK ROZETLERİ */
        .trust-badges { margin-top: 30px; display: flex; gap: 20px; align-items: center; opacity: 0.4; filter: grayscale(1); transition: 0.5s; }
        .trust-badges:hover { opacity: 0.8; filter: grayscale(0); }
        .badge { font-size: 0.65rem; font-weight: 900; color: #fff; letter-spacing: 2px; border: 1px solid #333; padding: 5px 12px; border-radius: 5px; text-transform: uppercase; }

        /* SOSYAL & BUTONLAR */
        .social-dock { position: fixed; bottom: 30px; right: 30px; display: flex; gap: 15px; z-index: 100; }
        .social-icon { width: 48px; height: 48px; background: rgba(255,255,255,0.03); border: 1px solid #222; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; transition: 0.3s; font-size: 1.1rem; }
        .social-icon:hover { border-color: var(--pink); color: var(--pink); transform: translateY(-5px); box-shadow: 0 0 20px rgba(255,105,180,0.2); }
        
        .btn-container { margin-top: 50px; display: flex; flex-direction: column; gap: 15px; width: 100%; max-width: 320px; z-index: 10; }
        .btn { padding: 20px; border-radius: 15px; border: none; font-weight: 900; cursor: pointer; text-transform: uppercase; transition: 0.4s; font-size: 0.85rem; letter-spacing: 1.5px; }
        .btn-primary { background: var(--green); color: #000; box-shadow: 0 15px 35px rgba(46, 204, 113, 0.15); }
        .btn-airdrop { background: linear-gradient(90deg, var(--pink), #8e44ad); color: white; box-shadow: 0 10px 30px rgba(255,105,180,0.3); }
        .btn:hover { transform: translateY(-5px); filter: brightness(1.2); }

        @media (max-width: 600px) { 
            .terminal, .trust-badges { display: none; } 
            h1 { font-size: 4rem; letter-spacing: -3px; } 
            .social-dock { bottom: 20px; right: 20px; }
        }
    </style>
</head>
