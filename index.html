<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETHIC | Fair Data Ownership Protocol</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #030508;
            --green: #2ecc71;
            --pink: #ff69b4;
            --text-dim: #666;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { 
            width: 100%; height: 100%; 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg); 
            color: white; overflow: hidden;
        }

        /* 🌌 GÖRSELDEKİ ARKA PLAN IŞIKLARI */
        .glow-layer {
            position: fixed; inset: 0; z-index: -1;
            background: 
                radial-gradient(circle at 10% 40%, rgba(255, 105, 180, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 40%, rgba(46, 204, 113, 0.1) 0%, transparent 40%);
        }

        /* 🚀 NAVİGASYON (GÖRSELLE AYNI) */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 30px 60px; position: fixed; width: 100%; top: 0; z-index: 100;
        }
        .logo-section { display: flex; align-items: center; gap: 12px; }
        .logo-icon {
            width: 28px; height: 32px; border: 1.5px solid var(--pink);
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 15px var(--pink);
        }
        .logo-text { font-weight: 900; font-size: 1.6rem; letter-spacing: 2px; }

        .nav-links { display: flex; gap: 40px; }
        .nav-item { 
            color: var(--text-dim); text-decoration: none; font-size: 0.85rem; 
            font-weight: 700; text-transform: capitalize; transition: 0.3s;
        }
        .nav-item.active { color: var(--green); position: relative; }
        .nav-item.active::after {
            content: ''; position: absolute; bottom: -12px; left: 0; 
            width: 100%; height: 2px; background: var(--green);
            box-shadow: 0 0 15px var(--green);
        }

        /* 🛡️ ANA GÖRSEL VE TYPOGRAPHY */
        .hero {
            height: 100vh; display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center;
        }

        .visual-core {
            position: relative; width: 500px; height: 350px;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: -40px;
        }
        /* CSS İLE ÇİZİLMİŞ BEYİN VE KALKAN KATMANI */
        .shield-neon {
            width: 120px; height: 150px; border: 2px solid var(--green);
            clip-path: polygon(50% 0%, 100% 20%, 100% 80%, 50% 100%, 0% 80%, 0% 20%);
            box-shadow: 0 0 40px rgba(46, 204, 113, 0.4);
            background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center;
            z-index: 5;
        }
        .brain-glow {
            position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(255,105,180,0.1) 0%, transparent 70%);
            filter: blur(30px); z-index: 1;
        }

        h1 { 
            font-size: 8.5rem; font-weight: 900; letter-spacing: -8px; 
            line-height: 0.8; margin-bottom: 10px;
            background: linear-gradient(to right, var(--green) 20%, #fff 50%, var(--pink) 80%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .sub-text { font-size: 1.1rem; color: var(--text-dim); letter-spacing: 2px; margin-bottom: 40px; }

        /* 🔘 BUTONLAR (GÖRSELDEKİ ÜÇLÜ YAPI) */
        .btn-wrap { display: flex; gap: 15px; }
        .btn {
            padding: 16px 30px; border-radius: 50px; border: none;
            font-weight: 900; cursor: pointer; font-size: 0.85rem;
            transition: 0.4s; text-decoration: none; text-transform: capitalize;
        }
        .btn-green { background: var(--green); color: black; }
        .btn-dark { background: #222; color: white; border: 1px solid #333; }
        .btn-waitlist { 
            background: rgba(255, 105, 180, 0.1); color: white; 
            border: 1px solid var(--pink); box-shadow: 0 0 20px rgba(255, 105, 180, 0.3);
        }

        /* 🟢 ALT SAYAÇ (ŞEFFAF CAM) */
        .status-bar {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            background: rgba(255,255,255,0.03); padding: 10px 30px; border-radius: 50px;
            border: 1px solid rgba(46, 204, 113, 0.2); backdrop-filter: blur(15px);
            display: flex; align-items: center; gap: 12px; font-size: 0.8rem;
        }
        .live-indicator { 
            width: 8px; height: 8px; background: var(--green); 
            border-radius: 50%; box-shadow: 0 0 10px var(--green);
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* 📱 SOSYAL DOCK (SAĞ TARAF) */
        .socials {
            position: absolute; right: 40px; top: 50%; transform: translateY(-50%);
            display: flex; flex-direction: column; gap: 20px;
        }
        .social-btn {
            width: 45px; height: 45px; border-radius: 12px;
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1);
            display: flex; align-items: center; justify-content: center;
            color: white; text-decoration: none; transition: 0.3s;
        }
        .social-btn:hover { border-color: var(--pink); color: var(--pink); transform: translateX(-5px); }

        /* Yıldız İkonu (Sağ Alt) */
        .star-decoration { position: absolute; bottom: 40px; right: 40px; color: var(--text-dim); opacity: 0.4; font-size: 1.5rem; }

    </style>
</head>
<body>

    <div class="glow-layer"></div>

    <nav>
        <div class="logo-section">
            <div class="logo-icon"><i class="fas fa-bolt" style="color:var(--pink); font-size:0.7rem;"></i></div>
            <div class="logo-text">ETHIC</div>
        </div>
        <div class="nav-links">
            <a href="#" class="nav-item">Ecosystem</a>
            <a href="#" class="nav-item">Network</a>
            <a href="#" class="nav-item active">Governance</a>
        </div>
    </nav>

    <div class="hero">
        <div class="visual-core">
            <div class="brain-glow"></div>
            <div class="shield-neon">
                <i class="fas fa-fingerprint" style="color:var(--green); font-size:2.5rem;"></i>
            </div>
        </div>

        <h1 data-text="ETHIC">ETHIC</h1>
        <p class="sub-text">Fair Data Ownership Protocol</p>

        <div class="btn-wrap">
            <button class="btn btn-green" onclick="connect()">Connect Wallet</button>
            <button class="btn btn-dark">Protocol Specs</button>
            <button class="btn btn-waitlist">Join Genesis Waitlist</button>
        </div>

        <div class="status-bar">
            <div class="live-indicator"></div>
            <span style="color:var(--text-dim)">Live</span>
            <span>Data Processed: <strong>1,241,120 GB</strong></span>
        </div>
    </div>

    <div class="socials">
        <a href="#" class="social-btn"><i class="fab fa-telegram-plane"></i></a>
        <a href="#" class="social-icon social-btn"><i class="fab fa-twitter"></i></a>
    </div>

    <div class="star-decoration">✦</div>

    <script>
        function connect() {
            if(window.ethereum) {
                window.ethereum.request({method:'eth_requestAccounts'})
                .then(res => alert("Wallet Connected: " + res[0]));
            } else { alert("Please install MetaMask"); }
        }
    </script>
</body>
</html>
