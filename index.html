<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETHIC | Fair Data Ownership Protocol</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #030508; --green: #2ecc71; --pink: #ff69b4; --text: #888; }
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        body, html { width: 100%; height: 100%; font-family: 'Inter', sans-serif; background: var(--bg); color: #fff; overflow-x: hidden; }

        /* 🌌 BACKGROUND NETWORK EFFECT */
        #canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.6; }

        /* 🚀 NAV (YAZILAR SAĞDA & KUSURSUZ) */
        nav { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 20px 5%; position: fixed; width: 100%; top: 0; 
            backdrop-filter: blur(25px); border-bottom: 1px solid rgba(255,255,255,0.05); z-index: 1000; 
        }
        .logo-area { font-weight: 900; font-size: 1.2rem; letter-spacing: 2px; color: var(--green); text-decoration: none; }
        .nav-links { display: flex; gap: 30px; }
        .nav-item { position: relative; color: #555; text-decoration: none; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; cursor: pointer; transition: 0.3s; }
        .nav-item.active { color: var(--pink); filter: drop-shadow(0 0 5px var(--pink)); }
        
        /* 🛡️ THE REAL ETHIC NEON LOGO (KODLA YAPILDI) */
        .hero-container { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 120px 20px 80px 20px; }
        
        .shield-container {
            position: relative; width: 320px; height: 320px; margin-bottom: 10px;
            display: flex; align-items: center; justify-content: center;
        }

        /* 🟢 PARMAK İZİ VE KALKAN (CSS) */
        .shield-base {
            position: absolute; width: 100%; height: 100%;
            border: 2px solid var(--green); border-radius: 50% 50% 0 0;
            clip-path: polygon(50% 0%, 100% 20%, 100% 100%, 50% 85%, 0% 100%, 0% 20%);
            background: linear-gradient(135deg, rgba(46, 204, 113, 0.05) 0%, transparent 80%);
            box-shadow: 0 0 30px rgba(46, 204, 113, 0.4);
            z-index: 1;
        }
        .fingerprint-core {
            position: absolute; left: 15%; top: 15%; width: 70%; height: 70%;
            background: repeating-radial-gradient(circle, var(--green) 0, var(--green) 1px, transparent 2px, transparent 4px);
            opacity: 0.3; z-index: 2;
        }

        /* 🧠 BEYİN AĞLARI (CSS VE ANIMASYON) */
        .brain-core {
            position: absolute; right: 10%; top: 10%; width: 80%; height: 80%;
            background: radial-gradient(circle, var(--pink) 0%, transparent 60%);
            opacity: 0.1; filter: blur(20px); z-index: 3;
        }
        .brain-network {
            position: absolute; width: 100%; height: 100%; z-index: 4;
            background: repeating-linear-gradient(45deg, transparent 0, transparent 15px, var(--pink) 16px, var(--pink) 17px);
            opacity: 0.2; transform: scale(1.1); animation: networkPulse 2s infinite alternate;
        }
        @keyframes networkPulse { 0% { opacity: 0.2; } 100% { opacity: 0.5; } }

        h1 { font-size: clamp(3.5rem, 15vw, 9rem); font-weight: 900; letter-spacing: -7px; line-height: 0.8; background: linear-gradient(135deg, var(--green), var(--pink)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; color: transparent; position: relative; margin-top: 15px; }
        .tagline { color: #666; font-size: 0.95rem; letter-spacing: 5px; text-transform: uppercase; font-weight: 700; margin-top: 20px; }

        /* 🟢 CENTERED LIVE COUNTER */
        .live-counter { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); padding: 12px 30px; border-radius: 50px; border: 1px solid rgba(46, 204, 113, 0.25); font-size: 0.75rem; color: var(--green); backdrop-filter: blur(15px); z-index: 100; white-space: nowrap; }
        .dot { height: 8px; width: 8px; background-color: var(--green); border-radius: 50%; display: inline-block; margin-right: 12px; animation: blink 1.2s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.3; transform: scale(0.8); } }

        /* 📱 MOBILE OPTIMIZATION (DENGELİ) */
        @media (max-width: 768px) {
            nav { flex-direction: row; padding: 15px 5%; justify-content: center; }
            .nav-top { justify-content: center; margin-bottom: 10px; }
            .nav-links { gap: 15px; flex-wrap: wrap; justify-content: center; margin-top: 5px; }
            .nav-item { font-size: 0.6rem; }
            h1 { font-size: 4rem; letter-spacing: -2px; }
            .shield-container { width: 220px; height: 220px; }
            .social-dock { bottom: 80px; right: 20px; flex-direction: column; }
        }

        .btn-container { margin-top: 50px; display: flex; flex-direction: column; gap: 15px; width: 100%; max-width: 320px; }
        .btn { padding: 20px; border-radius: 15px; border: none; font-weight: 900; cursor: pointer; text-transform: uppercase; transition: 0.4s; font-size: 0.85rem; letter-spacing: 1px; }
        .btn-primary { background: var(--green); color: #000; }
        .btn-secondary { background: transparent; border: 1px solid #333; color: #888; }
        .btn-airdrop { background: linear-gradient(90deg, var(--pink), #8e44ad); color: white; box-shadow: 0 10px 25px rgba(255,105,180,0.25); }
    </style>
</head>
