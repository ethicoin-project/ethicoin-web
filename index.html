<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETHIC | Decentralized Sovereign AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #030508; --green: #2ecc71; --pink: #ff69b4; --text: #888; }
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        body, html { width: 100%; height: 100%; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }

        #canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.4; }

        nav { display: flex; flex-direction: column; align-items: center; padding: 20px 5%; position: fixed; width: 100%; top: 0; backdrop-filter: blur(30px); border-bottom: 1px solid rgba(255,255,255,0.05); z-index: 1000; }
        .logo { font-weight: 900; font-size: 1.4rem; letter-spacing: 4px; color: var(--green); text-decoration: none; margin-bottom: 15px; }
        .nav-links { display: flex; gap: 40px; justify-content: center; width: 100%; }
        .nav-item { position: relative; color: #444; text-decoration: none; font-size: 0.75rem; font-weight: 900; text-transform: uppercase; cursor: pointer; background: #444; -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav-item.active { color: var(--pink); background: var(--pink); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 8px var(--pink)); }

        .container { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 160px 20px 100px 20px; }
        h1 { font-size: clamp(3.5rem, 15vw, 8.5rem); font-weight: 900; letter-spacing: -7px; line-height: 0.85; background: linear-gradient(135deg, var(--green), var(--pink)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; color: transparent; position: relative; margin-bottom: 15px; }
        .tagline { color: #555; font-size: 0.9rem; letter-spacing: 6px; text-transform: uppercase; font-weight: 700; }

        .terminal { position: fixed; bottom: 30px; left: 20px; width: 280px; height: 160px; background: rgba(0,0,0,0.8); border-radius: 12px; border: 1px solid #1a1a1a; padding: 15px; font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; color: var(--green); overflow: hidden; display: flex; flex-direction: column-reverse; box-shadow: 0 10px 40px rgba(0,0,0,0.6); z-index: 100; }
        .terminal span { margin-bottom: 5px; opacity: 0.9; }

        .btn-container { margin-top: 50px; display: flex; flex-direction: column; gap: 15px; width: 100%; max-width: 320px; z-index: 10; }
        .btn { padding: 20px; border-radius: 15px; border: none; font-weight: 900; cursor: pointer; text-transform: uppercase; transition: 0.4s; font-size: 0.85rem; letter-spacing: 1.5px; }
        .btn-primary { background: var(--green); color: #000; }
        .btn-airdrop { background: linear-gradient(90deg, var(--pink), #8e44ad); color: white; }

        .social-dock { position: fixed; bottom: 30px; right: 30px; display: flex; gap: 15px; z-index: 100; }
        .social-icon { width: 48px; height: 48px; background: rgba(255,255,255,0.03); border: 1px solid #222; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; transition: 0.3s; }

        @media (max-width: 600px) { .terminal { display: none; } h1 { font-size: 4rem; } }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>
    <nav>
        <a href="#" class="logo">ETHIC</a>
        <div class="nav-links">
            <a href="#" class="nav-item active">Ecosystem</a>
            <a href="#" class="nav-item">Network</a>
            <a href="#" class="nav-item">Governance</a>
        </div>
    </nav>

    <div class="container">
        <h1 data-text="ETHIC">ETHIC</h1>
        <div class="tagline">Data Sovereignty Engine</div>
        <div class="btn-container">
            <button id="walletBtn" class="btn btn-primary" onclick="connectWallet()">Connect Wallet</button>
            <button id="airdropBtn" class="btn btn-airdrop" onclick="joinWaitlist()">Genesis Waitlist</button>
        </div>
    </div>

    <div class="terminal" id="terminal">
        <span>>> SYSTEM READY...</span>
    </div>

    <div class="social-dock">
        <a href="https://t.me/ethicprotocol" target="_blank" class="social-icon"><i class="fab fa-telegram-plane"></i></a>
        <a href="https://x.com/ethicprotocol" target="_blank" class="social-icon"><i class="fab fa-x-twitter"></i></a>
    </div>

    <script>
        const term = document.getElementById('terminal');
        function log(msg) {
            const span = document.createElement('span');
            span.textContent = ">> " + msg;
            term.prepend(span);
            if(term.children.length > 8) term.lastChild.remove();
        }

        async function connectWallet() {
            if (window.ethereum) {
                try {
                    log("INITIALIZING EIP-1193...");
                    const acc = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    const address = acc[0];
                    document.getElementById('walletBtn').innerText = address.substring(0,6)+"..."+address.slice(-4);
                    log("WALLET CONNECTED: " + address.substring(0,12) + "...");
                    log("NETWORK: ETHEREUM MAINNET");
                    localStorage.setItem('ethic_wallet', address);
                } catch (err) {
                    log("CONNECTION REJECTED BY USER");
                }
            } else {
                log("ERROR: NO PROVIDER DETECTED");
                alert("MetaMask required.");
            }
        }

        function joinWaitlist() {
            const w = localStorage.getItem('ethic_wallet');
            if(!w) {
                log("ACTION DENIED: CONNECT WALLET");
                alert("Connect wallet first.");
            } else {
                log("REGISTERING ADDR TO GENESIS...");
                log("SUCCESS: ACCOUNT VERIFIED");
                document.getElementById('airdropBtn').innerText = "REGISTERED";
                document.getElementById('airdropBtn').style.background = "#2ecc71";
            }
        }

        // Arka plan parçacık sistemi (Ağ yapısı temsili)
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        let p = [];
        class Part {
            constructor() { this.x = Math.random()*canvas.width; this.y = Math.random()*canvas.height; this.vx = (Math.random()-0.5)*0.3; this.vy = (Math.random()-0.5)*0.3; }
            draw() { ctx.fillStyle = 'rgba(46,204,113,0.2)'; ctx.beginPath(); ctx.arc(this.x,this.y,1,0,Math.PI*2); ctx.fill(); }
            update() { this.x += this.vx; this.y += this.vy; if(this.x<0||this.x>canvas.width) this.vx*=-1; if(this.y<0||this.y>canvas.height) this.vy*=-1; }
        }
        for(let i=0;i<100;i++) p.push(new Part());
        function anim() { ctx.clearRect(0,0,canvas.width,canvas.height); p.forEach(i=>{i.update();i.draw();}); requestAnimationFrame(anim); }
        anim();
    </script>
</body>
</html>
