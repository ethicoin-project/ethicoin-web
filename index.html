<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETHIC | Fair Data Ownership Protocol</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0b0e11; --green: #2ecc71; --pink: #ff69b4; --text: #a0a0a0; }
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        
        body, html { 
            width: 100%; height: 100%; overflow-x: hidden; 
            font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text);
        }

        /* 🚀 ÜST MENÜ (NAVIGASYON) */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 5%; position: fixed; width: 100%; top: 0;
            backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.05);
            z-index: 1000;
        }
        .logo { font-weight: 900; font-size: 1.2rem; letter-spacing: 2px; color: var(--green); }

        /* 🔍 SOLANA STYLE AI SEARCH BAR (YENİ) */
        .search-container {
            flex: 1; max-width: 400px; margin: 0 40px; position: relative;
        }
        .search-input {
            width: 100%; background: rgba(255,255,255,0.03); border: 1px solid #333;
            border-radius: 10px; padding: 10px 15px 10px 40px; color: white;
            font-size: 0.85rem; transition: 0.3s;
        }
        .search-input:focus {
            border-color: var(--pink); box-shadow: 0 0 15px rgba(255, 105, 180, 0.2);
            background: rgba(255,255,255,0.07);
        }
        .search-icon {
            position: absolute; left: 15px; top: 50%; transform: translateY(-50%);
            color: #555; font-size: 0.8rem;
        }
        .search-shortcut {
            position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
            background: #222; color: #666; padding: 2px 6px; border-radius: 4px;
            font-size: 0.6rem; font-weight: 900;
        }

        .nav-links { display: flex; gap: 20px; align-items: center; }
        .nav-item {
            position: relative; color: #666; text-decoration: none; 
            font-size: 0.75rem; font-weight: 600; text-transform: uppercase;
            background: #666; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; transition: 0.3s ease; cursor: pointer;
        }

        /* IŞIK KAYMASI EFEKTİ */
        .nav-item::after, h1::after {
            content: attr(data-text); position: absolute; left: 0; top: 0; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent 0%, transparent 40%, rgba(255, 255, 255, 0.4) 50%, transparent 60%, transparent 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; background-size: 200% 100%;
            background-position: -150% 0%; animation: lightScan 4s infinite linear;
        }

        /* AKTİF MENÜ (PEMBE NEON) */
        .nav-item.active {
            color: var(--pink); background: var(--pink); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; filter: drop-shadow(0 0 5px rgba(255, 105, 180, 0.8));
        }

        .container {
            min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; padding-top: 80px;
            background: radial-gradient(circle at center, #161b22 0%, #0b0e11 100%);
        }

        h1 { 
            font-size: clamp(3rem, 12vw, 6.5rem); font-weight: 900; letter-spacing: -4px; line-height: 1;
            margin: 0; text-transform: uppercase;
            background: linear-gradient(135deg, var(--green), var(--pink)); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
            background-clip: text; color: transparent; position: relative;
        }

        .tagline { color: #777; font-size: 0.9rem; margin-top: 15px; letter-spacing: 5px; text-transform: uppercase; font-weight: 600; }
        .mission-text { max-width: 500px; margin-top: 20px; font-size: 1rem; line-height: 1.6; color: #666; padding: 0 20px; }

        .btn-container { margin-top: 40px; display: flex; flex-direction: column; gap: 15px; width: 85%; max-width: 300px; z-index: 10; }
        .btn { padding: 18px; border-radius: 12px; border: none; font-weight: 600; font-size: 0.9rem; cursor: pointer; text-transform: uppercase; transition: 0.3s ease; }
        .btn-primary { background: var(--green); color: #000; }
        .btn-secondary { background: transparent; border: 1px solid #333; color: #888; }
        .btn:hover { transform: translateY(-3px); filter: brightness(1.1); }

        .social-dock { position: fixed; bottom: 30px; right: 30px; display: flex; gap: 15px; z-index: 100; }
        .social-icon { width: 45px; height: 45px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; text-decoration: none; transition: 0.3s; backdrop-filter: blur(10px); }
        .social-icon:hover { transform: translateY(-5px); border-color: var(--green); color: var(--green); }

        @keyframes lightScan { 0% { background-position: -150% 0%; } 100% { background-position: 150% 0%; } }

        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); padding: 20px; backdrop-filter: blur(10px); }
        .modal-content { background: #0b0e11; margin: 5% auto; padding: 40px; border: 1px solid #222; width: 95%; max-width: 650px; border-radius: 20px; text-align: left; color: #999; line-height: 1.8; }
        .close { color: var(--pink); float: right; font-size: 30px; cursor: pointer; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">ETHIC</div>
        
        <div class="search-container">
            <i class="fas fa-search search-icon"></i>
            <input type="text" class="search-input" placeholder="Ask ETHIC AI Protocol..." onfocus="this.placeholder='Type your question...'" onblur="this.placeholder='Ask ETHIC AI Protocol...'">
            <div class="search-shortcut">⌘ K</div>
        </div>

        <div class="nav-links">
            <a href="#" class="nav-item active" data-text="Ecosystem" onclick="setActive(this)">Ecosystem</a>
            <a href="#" class="nav-item" data-text="Network" onclick="setActive(this)">Network</a>
            <a href="#" class="nav-item" data-text="Governance" onclick="setActive(this)">Governance</a>
            <a href="#" class="nav-item" data-text="Build" onclick="setActive(this)">Build</a>
        </div>
    </nav>

    <div class="container">
        <h1 data-text="ETHIC">ETHIC</h1>
        <div class="tagline">Fair Data Ownership</div>
        <p class="mission-text">
            Converting your digital footprint into fair value. No exploitation, just transparent and ethical data sovereignty.
        </p>
        <div class="btn-container">
            <button id="walletBtn" class="btn btn-primary" onclick="connect()">Connect Wallet</button>
            <button class="btn btn-secondary" onclick="openModal()">Protocol Ethics</button>
        </div>
    </div>

    <div class="social-dock">
        <a href="#" class="social-icon" title="Telegram"><i class="fab fa-telegram-plane"></i></a>
        <a href="#" class="social-icon" title="X (Twitter)"><i class="fab fa-x-twitter"></i></a>
    </div>

    <div id="wpModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2 style="color:var(--green); margin-bottom:20px;">⚖️ THE ETHICAL FRAMEWORK</h2>
            <p>ETHIC ensures your digital identity remains <span style="color:#ddd; font-weight:600;">your private property</span>.</p>
            <button class="btn btn-primary" style="width:100%; margin-top:25px;" onclick="closeModal()">UNDERSTOOD</button>
        </div>
    </div>

    <script>
        function setActive(element) {
            const items = document.querySelectorAll('.nav-item');
            items.forEach(item => item.classList.remove('active'));
            element.classList.add('active');
        }

        async function connect() {
            if (window.ethereum) {
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                document.getElementById('walletBtn').innerText = accounts[0].substring(0, 6) + "..." + accounts[0].slice(-4);
                document.getElementById('walletBtn').style.background = "#fff";
            } else { alert("MetaMask required!"); }
        }
        function openModal() { document.getElementById("wpModal").style.display = "block"; }
        function closeModal() { document.getElementById("wpModal").style.display = "none"; }
    </script>
</body>
</html>
