<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETHIC | Fair Data Ownership Protocol</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #030508;
            --green: #2ecc71;
            --pink: #ff69b4;
            --text-dim: #94a3b8;
            --neon-green: 0 0 15px rgba(46, 204, 113, 0.6);
            --neon-pink: 0 0 20px rgba(255, 105, 180, 0.8);
            --border: rgba(255,255,255,0.05);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        body, html { 
            width: 100%; font-family: 'Inter', sans-serif; 
            background-color: var(--bg); color: white; overflow-x: hidden;
            scroll-behavior: smooth;
        }

        .ambient-layer {
            position: fixed; inset: 0; z-index: -1;
            background: 
                radial-gradient(circle at 15% 45%, rgba(255, 105, 180, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 85% 45%, rgba(46, 204, 113, 0.08) 0%, transparent 50%);
        }

        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 5%; position: fixed; width: 100%; top: 0; z-index: 1000;
            background: rgba(3, 5, 8, 0.85); backdrop-filter: blur(10px);
        }
        
        .logo-text { 
            font-weight: 900; font-size: 1.5rem; letter-spacing: 2px; color: #fff; position: relative; overflow: hidden;
            background: linear-gradient(90deg, #fff 0%, var(--green) 50%, #fff 100%);
            background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: shimmer 3s linear infinite;
        }

        .nav-links { display: flex; gap: 25px; }
        .nav-item { color: var(--green); text-decoration: none; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; transition: 0.3s; position: relative; }
        .nav-item:hover { color: var(--pink); text-shadow: var(--neon-pink); }

        /* 🛡️ MAIN STAGE */
        .stage {
            min-height: 100vh; display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center;
            padding: 120px 20px;
        }

        .central-shield {
            position: relative; width: 90px; height: 120px; border: 2px solid var(--green); background: rgba(0,0,0,0.7);
            clip-path: polygon(50% 0%, 100% 20%, 100% 80%, 50% 100%, 0% 80%, 0% 20%);
            box-shadow: 0 0 30px rgba(46, 204, 113, 0.4); display: flex; align-items: center; justify-content: center;
        }

        h1 { 
            font-size: clamp(3.5rem, 15vw, 8.5rem); font-weight: 900; letter-spacing: -5px; line-height: 0.8;
            background: linear-gradient(90deg, var(--green) 0%, #fff 50%, var(--pink) 100%);
            background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: shimmer 4s linear infinite; margin: 10px 0;
        }

        @keyframes shimmer { 0% { background-position: -200% center; } 100% { background-position: 200% center; } }

        /* 👤 FOUNDER SECTION */
        .founder-section { padding: 80px 5%; display: flex; justify-content: center; border-bottom: 1px solid var(--border); }
        .founder-card {
            max-width: 800px; background: rgba(10, 15, 20, 0.6); padding: 40px; border-radius: 25px;
            border: 1px solid rgba(46, 204, 113, 0.2); backdrop-filter: blur(15px); display: flex; gap: 30px; align-items: center;
        }
        .founder-img-wrap { width: 100px; height: 100px; border-radius: 50%; border: 2px solid var(--green); padding: 5px; flex-shrink: 0; box-shadow: var(--neon-green); }
        .founder-img-wrap img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .founder-name { font-size: 1.8rem; font-weight: 900; color: #fff; }
        .founder-bio { font-size: 0.95rem; line-height: 1.6; color: var(--text-dim); margin: 10px 0; }

        /* 🗺️ SECTION GLOBAL STYLES */
        .section-title { font-size: 2.2rem; font-weight: 900; color: #fff; margin-bottom: 40px; text-transform: uppercase; letter-spacing: 4px; text-align: center; }

        /* 🗺️ ROADMAP SECTION */
        .roadmap-section { padding: 100px 10%; border-bottom: 1px solid var(--border); }
        .roadmap-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .roadmap-item {
            background: rgba(255, 255, 255, 0.02); padding: 30px; border-radius: 20px;
            border: 1px solid var(--border); text-align: left; transition: 0.3s;
        }
        .roadmap-item:hover { border-color: var(--pink); transform: scale(1.02); }
        .phase-tag { color: var(--green); font-family: 'Space Mono'; font-size: 0.75rem; margin-bottom: 10px; display: block; }

        /* 💎 TOKENOMICS SECTION (YENİ) */
        .tokenomics-section { padding: 100px 10%; }
        .tokenomics-content { display: flex; flex-wrap: wrap; gap: 50px; align-items: center; justify-content: center; }
        .tokenomics-stats { flex: 1; min-width: 300px; max-width: 500px; }
        .tokenomics-item { margin-bottom: 25px; }
        .tokenomics-label { display: flex; justify-content: space-between; margin-bottom: 8px; font-family: 'Space Mono'; font-size: 0.85rem; }
        .progress-bg { width: 100%; height: 8px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--green); box-shadow: var(--neon-green); border-radius: 10px; transition: 1.5s ease; width: 0; }
        
        .token-info-card { 
            background: rgba(255, 255, 255, 0.03); padding: 30px; border-radius: 20px; border: 1px solid rgba(46, 204, 113, 0.2); 
            min-width: 280px; text-align: left;
        }
        .info-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .info-row:last-child { border: none; }
        .info-label { color: var(--text-dim); font-size: 0.8rem; text-transform: uppercase; }
        .info-value { color: var(--green); font-weight: 700; font-family: 'Space Mono'; }

        /* 🔌 WALLET ACTIONS */
        .actions { display: flex; flex-direction: column; gap: 15px; width: 100%; max-width: 320px; margin-top: 40px; }
        .btn { padding: 18px; border-radius: 50px; border: none; font-weight: 800; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .btn-green { background: transparent; border: 1px solid var(--green); color: var(--green); }
        .btn-green.connected { background: var(--green); color: #000; box-shadow: var(--neon-green); }
        .btn-pink { background: rgba(255, 105, 180, 0.15); color: #fff; border: 1.5px solid var(--pink); }
