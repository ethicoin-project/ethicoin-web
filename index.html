<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETHICOIN | The Intelligence Protocol</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0b0e11; --green: #2ecc71; --pink: #ff69b4; --white: #ffffff; }

        * { box-sizing: border-box; }
        body { 
            background-color: var(--bg); color: var(--white); 
            font-family: 'Inter', sans-serif; margin: 0; 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; min-height: 100vh; text-align: center;
            overflow-x: hidden;
        }

        /* Işıltılı Arka Plan Efekti */
        body::before {
            content: ""; position: absolute; width: 300px; height: 300px;
            background: var(--green); filter: blur(150px); opacity: 0.1;
            top: 10%; left: 10%; z-index: -1;
        }

        /* Gradyan Başlık - Senin İmzan */
        h1 { 
            font-size: clamp(3.5rem, 15vw, 6.5rem); 
            background: linear-gradient(135deg, var(--green), var(--pink)); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
            margin: 0; font-weight: 900; letter-spacing: -3px;
            line-height: 1;
        }

        .tagline { 
            color: #888; font-size: 1rem; margin-top: 15px; 
            letter-spacing: 4px; text-transform: uppercase; font-weight: 400;
        }

        /* Buton Grubu */
        .btn-container { margin-top: 50px; display: flex; flex-direction: column; gap: 15px; width: 90%; max-width: 320px; }

        .btn {
            padding: 18px; border-radius: 14px; border: none; 
            font-weight: 700; font-size: 1rem; cursor: pointer; 
            transition: all 0.3s ease; text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .btn-primary { background: var(--green); color: #000; }
        .btn-secondary { background: transparent; border: 2px solid var(--pink); color: var(--pink); }

        .btn:hover { transform: translateY(-3px); filter: brightness(1.1); }
        .btn:active { transform: scale(0.98); }

        /* Sosyal Medya & Durum */
        .social-icons { margin-top: 40px; display: flex; gap: 25px; opacity: 0.6; }
        .social-icons a { color: white; text-decoration: none; font-size: 0.9rem; transition: 0.3s; }
        .social-icons a:hover { color: var(--pink); opacity: 1; }

        .status-bar { 
            margin-top: 30px; font-size: 0.75rem; color: #444; 
            display: flex; align-items: center; gap: 8px;
        }
        .dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; display: inline-block; animation: blink 1.5s infinite; }

        @keyframes blink { 0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; } }

        footer { margin-top: 60px; padding-bottom: 20px; color: #222; font-size: 0.7rem; }
    </style>
</head>
<body>

    <h1>ETHICOIN</h1>
    <div class="tagline">INTELLIGENCE PROTOCOL</div>

    <div class="btn-container">
        <button id="walletBtn" class="btn btn-primary" onclick="connectWallet()">Connect Wallet</button>
        <button class="btn btn-secondary" onclick="window.open('https://t.me/ethicoin', '_blank')">Join Community</button>
    </div>

    <div class="social-icons">
        <a href="#">TWITTER</a>
        <a href="#">TELEGRAM</a>
        <a href="#">WHITEPAPER</a>
    </div>

    <div class="status-bar">
        <span class="dot"></span> NETWORK: BSC/ETH MAINNET OPERATIONAL
    </div>

    <footer>ETHICOIN.BIZ — SECURED BY WEB3</footer>

    <script>
        // Modern ve Güvenli Web3 Bağlantısı
        async function connectWallet() {
            if (window.ethereum) {
                try {
                    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    const account = accounts[0];
                    const btn = document.getElementById('walletBtn');
                    
                    // Adresi kısaltıp butona yaz (Örn: 0x1234...abcd)
                    const displayAddress = account.substring(0, 6) + "..." + account.substring(account.length - 4);
                    btn.innerText = displayAddress;
                    btn.style.background = "white";
                    btn.style.color = "black";
                    
                    console.log("Welcome to ETHICOIN: " + account);
                } catch (error) {
                    if (error.code === 4001) {
                        alert("Please confirm the connection in MetaMask.");
                    } else {
                        console.error(error);
                    }
                }
            } else {
                alert("Please open this site in a Web3 browser like MetaMask or Brave.");
            }
        }
    </script>
</body>
</html>
