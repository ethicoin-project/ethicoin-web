<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETHIC | Neural Protocol Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <style>
        :root {
            --bg: #000000;
            --accent-green: #00ffa3;
            --accent-pink: #ff007a;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --text-dim: #888888;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; scroll-behavior: smooth; }

        /* 🌌 BACKGROUND */
        .void { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 20% 30%, rgba(0, 255, 163, 0.05) 0%, transparent 40%), radial-gradient(circle at 80% 70%, rgba(255, 0, 122, 0.05) 0%, transparent 40%); }
        .void::after { content: ''; position: absolute; inset: 0; background-image: url('https://grainy-gradients.vercel.app/noise.svg'); opacity: 0.15; pointer-events: none; }

        /* 🧭 NAV */
        nav { display: flex; justify-content: space-between; align-items: center; padding: 25px 5%; position: fixed; width: 100%; top: 0; z-index: 1000; backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); }
        .logo { font-weight: 800; font-size: 1.2rem; letter-spacing: -1px; display: flex; align-items: center; gap: 10px; }
        .logo-dot { width: 8px; height: 8px; background: var(--accent-green); border-radius: 50%; box-shadow: 0 0 15px var(--accent-green); }

        /* 🚀 HERO */
        .hero { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 0 20px; }
        .hero h1 { font-size: clamp(3.5rem, 10vw, 7rem); font-weight: 800; letter-spacing: -4px; line-height: 0.95; background: linear-gradient(180deg, #fff 30%, rgba(255,255,255,0.4) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hero p { color: var(--text-dim); margin-top: 20px; letter-spacing: 5px; font-weight: 600; font-size: 0.7rem; text-transform: uppercase; }

        /* 💻 DASHBOARD */
        #main-app { display: none; padding: 120px 5% 50px; animation: fadeIn 0.8s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .grid { display: grid; grid-template-columns: 1fr 350px; gap: 20px; max-width: 1300px; margin: 0 auto; }
        .glass-card { background: var(--glass); border: 1px solid var(--border); border-radius: 28px; padding: 35px; backdrop-filter: blur(30px); }

        .balance-label { font-size: 0.7rem; color: var(--text-dim); letter-spacing: 2px; text-transform: uppercase; }
        .balance-value { font-family: 'Space Mono'; font-size: 3rem; font-weight: 800; margin: 10px 0; color: var(--accent-green); }

        .tier-badge { display: inline-block; padding: 5px 12px; border-radius: 100px; font-size: 0.6rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; margin-top: 10px; background: rgba(0, 255, 163, 0.1); color: var(--accent-green); border: 1px solid rgba(0, 255, 163, 0.2); }

        .btn { padding: 14px 28px; border-radius: 100px; font-weight: 700; cursor: pointer; transition: 0.3s; border: none; font-size: 0.85rem; text-transform: uppercase; }
        .btn-primary { background: #fff; color: #000; }
        .btn-primary:hover { transform: scale(1.03); background: var(--accent-green); }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: #fff; }

        input { width: 100%; padding: 16px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 14px; color: #fff; margin-bottom: 10px; font-family: 'Space Mono'; outline: none; }
        input:focus { border-color: var(--accent-pink); }

        /* 🗺️ MAP */
        .map-container { margin-top: 30px; height: 150px; background: url('https://upload.wikimedia.org/wikipedia/commons/e/ec/World_map_blank_without_borders.svg') center/contain no-repeat; opacity: 0.1; position: relative; filter: invert(1); }
        .node-dot { position: absolute; width: 5px; height: 5px; background: var(--accent-green); border-radius: 50%; box-shadow: 0 0 8px var(--accent-green); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; transform: scale(1); } 100% { opacity: 0; transform: scale(3); } }

        #terminal { height: 150px; overflow-y: auto; font-family: 'Space Mono'; font-size: 0.65rem; color: var(--text-dim); line-height: 1.6; }
    </style>
</head>
<body>
    <div class="void"></div>

    <nav>
        <div class="logo"><div class="logo-dot"></div> ETHIC.AI</div>
        <button id="walletBtn" class="btn btn-outline" style="font-size: 0.7rem; padding: 10px 20px;" onclick="connect()">CONNECT NODE</button>
    </nav>

    <main class="hero" id="hero">
        <p>Decentralized Neural Sovereignty</p>
        <h1>OWN YOUR<br>DATA.</h1>
        <div style="margin-top: 40px; display: flex; gap: 15px;">
            <button class="btn btn-primary" onclick="connect()">INITIALIZE LINK</button>
            <button class="btn btn-outline" onclick="window.location.reload()">REFRESH</button>
        </div>
    </main>

    <section id="main-app">
        <div class="grid">
            <div class="glass-card">
                <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 30px;">
                    <div>
                        <span class="balance-label">Status: <span style="color: var(--accent-green);">Syncing</span></span><br>
                        <div id="userTier" class="tier-badge">CALCULATING NODE...</div>
                    </div>
                    <span class="balance-label" id="blockHeight">#0000000</span>
                </div>
                
                <p class="balance-label">Total Neural Rewards</p>
                <div class="balance-value" id="balance">0.0000</div>
                <p style="color: var(--text-dim); font-size: 0.7rem; letter-spacing: 1px;">$ETHIC NEURAL CREDITS</p>
                
                <div class="map-container">
                    <div class="node-dot" style="top: 25%; left: 15%;"></div>
                    <div class="node-dot" style="top: 40%; left: 45%;"></div>
                    <div class="node-dot" style="top: 55%; left: 75%;"></div>
                </div>
            </div>

            <div style="display: flex; flex-direction: column; gap: 20px;">
                <div class="glass-card" style="padding: 25px;">
                    <p class="balance-label" style="margin-bottom: 15px;">Broadcast Pulse</p>
                    <input type="text" id="target" placeholder="Recipient: 0x...">
                    <input type="number" id="amt" placeholder="Amount: 0.00">
                    <button class="btn btn-primary" style="width: 100%;" onclick="send()">SEND PULSE</button>
                </div>

                <div class="glass-card" style="padding: 25px; flex-grow: 1;">
                    <p class="balance-label" style="margin-bottom: 15px;">Neural Feed</p>
                    <div id="terminal">> Awaiting neural handshake...</div>
                </div>
            </div>
        </div>
    </section>

    <script>
        // Sözleşme Bilgileri
        const ADDR = "0xd8b934580fcE35a11B58C6D73aDeE468a2833fa8";
        const ABI = [
            "function transfer(address to, uint256 amount) returns (bool)",
            "function balanceOf(address owner) view returns (uint256)"
        ];

        let provider, signer, contract;

        async function connect() {
            if (typeof window.ethereum === 'undefined') {
                return alert("Lütfen MetaMask yükleyin!");
            }

            try {
                // Ethers v6 Bağlantısı
                provider = new ethers.BrowserProvider(window.ethereum);
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                signer = await provider.getSigner();
                contract = new ethers.Contract(ADDR, ABI, signer);
                
                const address = accounts[0];
                
                // UI Güncelleme
                document.getElementById('hero').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
                document.getElementById('walletBtn').innerText = address.slice(0,6) + "..." + address.slice(-4);
                
                log("Node Link Established: " + address);
                
                // İlk veri çekme
                updateData();
                // 10 saniyede bir otomatik güncelle
                setInterval(updateData, 10000);
            } catch (err) {
                console.error(err);
                log("Connection Failed: " + err.message);
            }
        }

        async function updateData() {
            try {
                const address = await signer.getAddress();
                const bal = await contract.balanceOf(address);
                const formattedBal = parseFloat(ethers.formatUnits(bal, 18));
                
                // Bakiye ve Blok No Yaz
                document.getElementById('balance').innerText = formattedBal.toLocaleString(undefined, {minimumFractionDigits: 4});
                const blockNum = await provider.getBlockNumber();
                document.getElementById('blockHeight').innerText = "#" + blockNum;

                // 🎖️ Tier Sistemi
                let tier = "Observer Node";
                let color = "var(--accent-green)";
                if(formattedBal >= 1000000) { tier = "Architect Node"; color = "var(--accent-pink)"; }
                else if(formattedBal >= 100000) tier = "Validator Node";
                else if(formattedBal > 0) tier = "Active Node";
                
                const badge = document.getElementById('userTier');
                badge.innerText = tier;
                badge.style.color = color;
                badge.style.borderColor = color;

            } catch (e) { console.log("Update Error:", e); }
        }

        async function send() {
            const to = document.getElementById('target').value;
            const amountStr = document.getElementById('amt').value;
            
            if(!to || !amountStr) return alert("Lütfen tüm alanları doldurun!");

            try {
                const amount = ethers.parseUnits(amountStr, 18);
                log("Broadcasting pulse to network...");
                
                const tx = await contract.transfer(to, amount);
                log("Transaction sent. Pulse ID: " + tx.hash.slice(0,12) + "...");
                
                await tx.wait();
                log("Pulse confirmed by blockchain.");
                updateData();
            } catch (err) {
                log("Broadcast failed: " + err.message.slice(0,40));
            }
        }

        function log(m) {
            const t = document.getElementById('terminal');
            const time = new Date().toLocaleTimeString();
            t.innerHTML = `<div><span style="color:#444">[${time}]</span> > ${m}</div>` + t.innerHTML;
        }
    </script>
</body>
</html>
