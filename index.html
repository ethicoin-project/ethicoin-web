        .glow-bg {
            position: fixed; inset: 0; z-index: -1;
            background:

                radial-gradient(circle at 85% 50%, rgba(46, 204, 113, 0.08) 0%, transparent 40%);
        }

        /* 🚀 NAV */
        nav {
            display: flex; justify-content: space-between; align-items: center;

            z-index: 100;
        }
        .logo-group { display: flex; align-items: center; gap: 10px; }
        .logo-img { width: 30px; filter: drop-shadow(0 0 5px var(--pink)); }

        .logo-text span { color: var(--pink); }

        .nav-links { display: flex; gap: 40px; }
        .nav-item { 
            color: var(--text-dim); text-decoration: none; font-size: 0.85rem; 
            font-weight: 600; text-transform: capitalize; transition: 0.3s;
        }
        .nav-item:hover, .nav-item.active { color: white; }
        .nav-item.active { position: relative; color: var(--green); }
        .nav-item.active::after {
            content: ''; position: absolute; bottom: -10px; left: 0; 
            width: 100%; height: 2px; background: var(--green);
            box-shadow: 0 0 10px var(--green);
        }

            position: relative; padding-top: 60px;

            position: relative; width: 600px; height: 400px;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: -40px;
        }

        }
        .tagline { 
            font-size: 1.1rem; color: var(--text-dim); letter-spacing: 1px;

        }
