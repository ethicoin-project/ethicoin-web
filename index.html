<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETHIC | Ethical Human Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0b0e11; --green: #2ecc71; --pink: #ff69b4; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body, html { 
            width: 100%; height: 100%; overflow: hidden; 
            font-family: 'Inter', sans-serif; background: var(--bg); 
        }

        /* VİDEO GELMEZSE ÇALIŞACAK IŞIK SİSTEMİ */
        .glow-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2;
            background: 
                radial-gradient(circle at 20% 30%, rgba(46, 204, 113, 0.15), transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(255, 105, 180, 0.15), transparent 40%);
            animation: pulse 8s infinite alternate;
        }

        @keyframes pulse { 0% { opacity: 0.5; } 100% { opacity: 1; } }

        /* VİDEO AYARI */
        #bg-video {
            position: fixed; right: 0; bottom: 0; min-width: 100%; min-height: 100%;
            z-index: -1; object-fit: cover; filter: brightness(0.3) contrast(1.1);
            transition: opacity 2s ease;
        }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; background: rgba(0,0,0,0.2);
        }

        h1 { 
            font-size: clamp(3.5rem, 15vw, 7.5rem); 
            background: linear-gradient(135deg, var(--green), var(--pink)); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
            font-weight: 900; letter-spacing: -5px; line-height: 1;
        }

        .tagline { color: #888; font-size: 0.9rem; margin-top: 15px; letter-spacing: 5px; text-transform: uppercase; }

        .btn-container { margin-top: 50px; display: flex; flex-direction: column; gap: 15px; width: 90%; max-width: 320px; }
        .btn {
            padding: 18px; border-radius: 14px; border: none; font-weight: 700; 
            font-size: 1rem; cursor: pointer; text-transform: uppercase; 
            transition: 0.3s; backdrop-filter: blur(10px);
        }
        .btn-primary { background: var(--green); color: #000; }
        .btn-secondary { background: rgba(255, 255, 255, 0.05); border: 2px solid var(--pink); color: var(--pink); }

        /* MODAL */
        .modal {
            display: none; position: fixed; z-index: 1000; left: 0; top: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.95);
            padding: 20px; backdrop-filter: blur(15px);
        }
        .modal-content {
            background: #161b22; margin: 5% auto; padding: 40px;
            border: 1px solid var(--green); width: 95%; max-width: 650px;
            border-radius: 25px; text-align: left; line-height: 1.8; color: #ccc;
        }
    </style>
</head>
<body>

    <div class="glow-bg"></div>

    <video autoplay muted loop playsinline id="bg-video" preload="auto">
        <source src="background.mp4" type="video/mp4">
    </video>

    <div class="overlay">
        <h1>ETHIC</h1>
        <div class="tagline">Ethical Human Intelligence</div>

        <div class="btn-container">
            <button id="walletBtn" class="btn btn-primary" onclick="connect()">Connect Wallet</button>
            <button class="btn btn-secondary" onclick="openModal()">The Manifesto</button>
        </div>
    </div>

    <div id="wpModal" class="modal">
        <div class="modal-content">
            <span style="color:var(--pink); float:right; cursor:pointer; font-size:35px;" onclick="closeModal()">&times;</span>
            <h2 style="color:var(--green);">📜 THE MANIFESTO</h2>
            <p style="font-style:italic; color:#eee; border-left:4px solid var(--pink); padding-left:15px; margin:20px 0;">
                "Data is the new oil, but tech giants reap the profits. <span style="color:var(--green)">ETHIC</span> returns value to its owners."
            </p>
            <p><strong>Total Supply:</strong> 1,000,000,000 ETHIC<br><strong>Status:</strong> Global Launch Active</p>
            <button class="btn btn-primary" style="width:100%; margin-top:20px;" onclick="closeModal()">CLOSE</button>
        </div>
    </div>

    <script>
        async function connect() {
            if (window.ethereum) {
                try {
                    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    document.getElementById('walletBtn').innerText = accounts[0].substring(0, 6) + "..." + accounts[0].slice(-4);
                    document.getElementById('walletBtn').style.background = "white";
                } catch (e) { console.log("Rejected"); }
            } else { alert("MetaMask Browser Required!"); }
        }
        function openModal() { document.getElementById("wpModal").style.display = "block"; }
        function closeModal() { document.getElementById("wpModal").style.display = "none"; }
    </script>
</body>
</html>
