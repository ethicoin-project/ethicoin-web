<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ETHICOIN | Take Your Data Back</title>
    <style>
        body { background-color: #0b0e11; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; }
        .container { width: 80%; margin: auto; text-align: center; padding-top: 100px; }
        h1 { font-size: 4rem; background: linear-gradient(to right, #2ecc71, #ff69b4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px; }
        p { font-size: 1.5rem; color: #a0a0a0; margin-bottom: 40px; }
        .btn { padding: 15px 30px; border-radius: 30px; border: none; font-weight: bold; cursor: pointer; margin: 10px; transition: 0.3s; font-size: 1rem; min-width: 180px; }
        .btn-green { background-color: #2ecc71; color: black; }
        .btn-outline { background: transparent; border: 2px solid #ff69b4; color: #ff69b4; }
        .btn:hover { transform: scale(1.1); box-shadow: 0 0 25px rgba(46, 204, 113, 0.5); }
        .connected { background-color: white !important; color: black !important; }
    </style>
</head>
<body>
    <div class="container">
        <h1>ETHICOIN</h1>
        <p>Be the True Owner of Your Data in the AI Revolution.</p>
        
        <button id="walletBtn" class="btn btn-green" onclick="connect()">Connect Wallet</button>
        
        <button class="btn btn-outline" onclick="alert('Whitepaper coming soon!')">Whitepaper</button>
    </div>

    <script>
        async function connect() {
            if (window.ethereum) {
                try {
                    // Bu satır MetaMask'ı tetikler
                    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    const account = accounts[0];
                    
                    // Bağlanınca butonun metni cüzdan adresin olur
                    const btn = document.getElementById('walletBtn');
                    btn.innerText = account.substring(0, 6) + "..." + account.substring(account.length - 4);
                    btn.classList.add('connected');
                } catch (error) {
                    console.log("User rejected");
                }
            } else {
                alert("Please install MetaMask extension!");
            }
        }
    </script>
</body>
</html>
