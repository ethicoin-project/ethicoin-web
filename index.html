<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETHIC | Fair Data Ownership Protocol</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0b0e11; --green: #2ecc71; --pink: #ff69b4; --text: #a0a0a0; }
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        body, html { width: 100%; height: 100%; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }

        /* 🚀 NAV & SEARCH */
        nav { display: grid; grid-template-columns: 1fr 2fr 1fr; align-items: center; padding: 15px 5%; position: fixed; width: 100%; top: 0; backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.05); z-index: 1000; }
        .logo { font-weight: 900; font-size: 1.1rem; letter-spacing: 2px; color: var(--green); text-decoration: none; justify-self: start; }
        .search-container { width: 100%; max-width: 450px; position: relative; justify-self: center; }
        .search-input { width: 100%; background: rgba(255,255,255,0.03); border: 1px solid #333; border-radius: 12px; padding: 10px 45px; color: white; font-size: 0.85rem; }
        .search-icon { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #555; }
        .nav-links { display: flex; gap: 15px; justify-self: end; }
        .nav-item { position: relative; color: #666; text-decoration: none; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; cursor: pointer; background: #666; -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav-item.active { color: var(--pink); background: var(--pink); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 5px var(--pink)); }
        
        /* ✨ IŞIK KAYMASI ✨ */
        .nav-item::after, h1::after { content: attr(data-text); position: absolute; left: 0; top: 0; width: 100%; height: 100%; background: linear-gradient(90deg, transparent 0%, transparent 40%, rgba(255, 255, 255, 0.4) 50%, transparent 60%, transparent 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-size: 200% 100%; background-position: -150% 0%; animation: lightScan 4s infinite linear; }
        @keyframes lightScan { 0% { background-position: -150% 0%; } 100% { background-position: 150% 0%; } }

        /* HERO SECTION */
        .container { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 120px 20px; background: radial-gradient(circle at center, #161b22 0%, #0b0e11 100%); }
        h1 { font-size: clamp(2.5rem, 10vw, 6.5rem); font-weight: 900; letter-spacing: -3px; line-height: 1; background: linear-gradient(135deg, var(--green), var(--pink)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; color: transparent; position: relative; }
        .tagline { color: #777; font-size: 0.85rem; margin-top: 15px; letter-spacing: 4px; text-transform: uppercase; font-weight: 600; max-width: 80%; }

        /* 📊 MODALS */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.97); backdrop-filter: blur(25px); overflow-y: auto; padding: 20px; }
        .modal-content { background: #0b0e11; margin: 40px auto; padding: 30px; border: 1px solid #222; width: 100%; max-width: 700px; border-radius: 25px; border-top: 4px solid var(--green); }
        .ai-header { color: var(--pink); font-weight: 900; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        
        /* TABLO & SAYAÇ (KORUNANLAR) */
        .responsive-table { width: 100%; border-collapse: collapse; color: #eee; margin-bottom: 20px; }
        .responsive-table td { padding: 12px; border-bottom: 1px solid #1a1a1a; font-size: 0.85rem; }
        .live-counter { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); padding: 10px 20px; border-radius: 50px; border: 1px solid rgba(46, 204, 113, 0.3); font-size: 0.7rem; color: var(--green); z-index: 100; white-space: nowrap; }

        .social-dock { position: fixed; bottom: 30px; right: 30px; display: flex; gap: 15px; z-index: 100; }
        .social-icon { width: 45px; height: 45px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; text-decoration: none; transition: 0.3s; }
        .btn-container { margin-top: 30px; display: flex; flex-direction: column; gap: 15px; width: 100%; max-width: 300px; }
        .btn { padding: 18px; border-radius: 12px; border: none; font-weight: 600; cursor: pointer; text-transform: uppercase; transition: 0.3s; font-size: 0.85rem; }
        .btn-primary { background: var(--green); color: #000; }
        .btn-secondary { background: transparent; border: 1px solid #333; color: #888; }
    </style>
</head>
<body>

    <nav>
        <a href="#" class="logo">ETHIC</a>
        <div class="search-container">
            <i class="fas fa-search search-icon"></i>
            <input type="text" id="aiSearch" class="search-input" placeholder="Ask anything to ETHIC AI..." onkeydown="if(event.key==='Enter') askAI()">
        </div>
        <div class="nav-links">
            <a href="#" class="nav-item active" data-text="Eco" onclick="setActive(this)">Eco</a>
            <a href="#" class="nav-item" data-text="Net" onclick="setActive(this)">Net</a>
            <a href="#" class="nav-item" data-text="Gov" onclick="setActive(this)">Gov</a>
        </div>
    </nav>

    <div class="container">
        <h1 data-text="ETHIC">ETHIC</h1>
        <div class="tagline">Fair Data Ownership Protocol</div>
        <div class="btn-container">
            <button id="walletBtn" class="btn btn-primary" onclick="connectWallet()">Connect Wallet</button>
            <button class="btn btn-secondary" onclick="openWP()">Protocol Specs</button>
        </div>
    </div>

    <div class="live-counter">
        <span style="height:8px; width:8px; background:var(--green); border-radius:50%; display:inline-block; margin-right:8px;"></span> 
        Data Processed: <span id="dataCount">1,240,582</span> GB
    </div>

    <div class="social-dock">
        <a href="https://t.me/ethicprotocol" target="_blank" class="social-icon"><i class="fab fa-telegram-plane"></i></a>
        <a href="https://x.com/ethicprotocol" target="_blank" class="social-icon"><i class="fab fa-x-twitter"></i></a>
    </div>

    <div id="wpModal" class="modal">
        <div class="modal-content">
            <h2 style="color:var(--green)">⚖️ WHITE PAPER V1.0</h2>
            <table class="responsive-table">
                <tr><td>Community Rewards</td><td>50%</td><td>Live</td></tr>
                <tr><td>Ecosystem Fund</td><td>20%</td><td>Reserved</td></tr>
                <tr><td>Team Pay</td><td>10%</td><td>2Y Vesting</td></tr>
            </table>
            <button class="btn btn-primary" style="width:100%;" onclick="closeWP()">BACK</button>
        </div>
    </div>

    <div id="aiModal" class="modal">
        <div class="modal-content">
            <div class="ai-header"><i class="fas fa-brain"></i> ETHIC NEURAL NETWORK</div>
            <p id="aiResponseText" style="line-height:1.8; color:#eee; font-size:1rem;"></p>
            <div style="margin-top:25px; padding-top:15px; border-top:1px solid #222; font-size:0.75rem; color:var(--pink);">
                Status: Verified via Decentralized Nodes
            </div>
            <button class="btn btn-primary" style="width:100%; margin-top:20px;" onclick="closeAI()">CONFIRM</button>
        </div>
    </div>

    <script>
        function setActive(element) { document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active')); element.classList.add('active'); }
        function openWP() { document.getElementById("wpModal").style.display = "block"; }
        function closeWP() { document.getElementById("wpModal").style.display = "none"; }
        function closeAI() { document.getElementById("aiModal").style.display = "none"; }

        // 🧠 GELİŞMİŞ AI CEVAP MANTIĞI
        function askAI() {
            const query = document.getElementById('aiSearch').value.trim();
            if(!query) return;

            const modal = document.getElementById('aiModal');
            const text = document.getElementById('aiResponseText');
            modal.style.display = 'block';
            text.innerHTML = "<em>Calculating ETHIC response...</em>";

            // ETHIC Vizyonuna Göre Akıllı Cevap Üretici
            setTimeout(() => {
                let response = "";
                const q = query.toLowerCase();

                if(q.includes("nasil") || q.includes("how")) {
                    response = "ETHIC Protocol uses Zero-Knowledge Proofs to verify data value without exposing personal identity. Your digital footprint is encrypted and rewarded via smart contracts.";
                } else if(q.includes("kazanç") || q.includes("earn") || q.includes("para")) {
                    response = "By contributing your anonymized data to the ETHIC ecosystem, you earn $ETHIC tokens directly from AI companies that use your data for training. Fair share, no middleman.";
                } else if(q.includes("güvenli") || q.includes("safe") || q.includes("secure")) {
                    response = "Security is our core principle. Every transaction is immutable on the blockchain, and your private data never leaves your device unencrypted.";
                } else if(q.includes("etik") || q.includes("ethics")) {
                    response = "Ethics in AI means recognizing humans as the true owners of data. ETHIC restores this balance by ensuring you are compensated for your digital existence.";
                } else {
                    response = "Analysing '" + query + "'... According to ETHIC standards, this interaction represents a decentralized request for data sovereignty. Our protocol supports your digital rights.";
                }
                text.innerHTML = response;
            }, 800);
        }

        async function connectWallet() {
            if (window.ethereum) {
                const acc = await window.ethereum.request({ method: 'eth_requestAccounts' });
                document.getElementById('walletBtn').innerText = acc[0].substring(0,6)+"..."+acc[0].slice(-4);
            }
        }

        let count = 1240582;
        setInterval(() => {
            count += Math.floor(Math.random() * 5);
            document.getElementById('dataCount').innerText = count.toLocaleString();
        }, 2000);
    </script>
</body>
</html>
