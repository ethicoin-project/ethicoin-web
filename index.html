<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETHIC | Decentralized Sovereign AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #030508; --green: #2ecc71; --pink: #ff69b4; --text: #888; }
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        body, html { width: 100%; height: 100%; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }

        /* 🌌 PARÇACIK ARKA PLANI */
        #canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }

        /* 🚀 NAV & LOGO */
        nav { display: flex; flex-direction: column; align-items: center; padding: 15px 5%; position: fixed; width: 100%; top: 0; backdrop-filter: blur(25px); border-bottom: 1px solid rgba(255,255,255,0.05); z-index: 1000; }
        .logo { font-weight: 900; font-size: 1.3rem; letter-spacing: 4px; color: var(--green); text-decoration: none; margin-bottom: 12px; }
        .nav-links { display: flex; gap: 30px; justify-content: center; width: 100%; }
        .nav-item { position: relative; color: #444; text-decoration: none; font-size: 0.75rem; font-weight: 900; text-transform: uppercase; cursor: pointer; background: #444; -webkit-background-clip: text; -webkit-text-fill-color: transparent; white-space: nowrap; }
        .nav-item.active { color: var(--pink); background: var(--pink); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 8px var(--pink)); }
        
        /* ✨ IŞIK KAYMASI ✨ */
        .nav-item::after, h1::after { content: attr(data-text); position: absolute; left: 0; top: 0; width: 100%; height: 100%; background: linear-gradient(90deg, transparent 0%, transparent 40%, rgba(255, 255, 255, 0.4) 50%, transparent 60%, transparent 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-size: 200% 100%; background-position: -150% 0%; animation: lightScan 5s infinite linear; }
        @keyframes lightScan { 0% { background-position: -150% 0%; } 100% { background-position: 150% 0%; } }

        /* MAIN HERO */
        .container { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 150px 20px 100px 20px; }
        h1 { font-size: clamp(3.5rem, 15vw, 8rem); font-weight: 900; letter-spacing: -6px; line-height: 0.9; background: linear-gradient(135deg, var(--green), var(--pink)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; color: transparent; position: relative; margin-bottom: 10px; }
        .tagline { color: #555; font-size: 0.85rem; letter-spacing: 5px; text-transform: uppercase; font-weight: 700; }

        /* 📟 CANLI İŞLEM TERMİNALİ (YENİ) */
        .terminal { position: fixed; bottom: 100px; left: 20px; width: 200px; height: 120px; background: rgba(0,0,0,0.5); border-radius: 10px; border: 1px solid #1a1a1a; padding: 10px; font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; color: var(--green); overflow: hidden; display: flex; flex-direction: column-reverse; pointer-events: none; }
        .terminal span { margin-bottom: 3px; opacity: 0.8; }

        /* 🟢 CANLI SAYAÇ */
        .live-counter { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); padding: 12px 30px; border-radius: 50px; border: 1px solid rgba(46, 204, 113, 0.2); font-size: 0.75rem; color: var(--green); backdrop-filter: blur(15px); z-index: 100; white-space: nowrap; }
        .dot { height: 8px; width: 8px; background-color: var(--green); border-radius: 50%; display: inline-block; margin-right: 12px; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }

        /* SOSYAL & BUTONLAR */
        .social-dock { position: fixed; bottom: 30px; right: 30px; display: flex; gap: 15px; z-index: 100; }
        .social-icon { width: 45px; height: 45px; background: rgba(255,255,255,0.03); border: 1px solid #222; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; transition: 0.3s; }
        .social-icon:hover { border-color: var(--pink); color: var(--pink); transform: translateY(-3px); }
        
        .btn-container { margin-top: 50px; display: flex; flex-direction: column; gap: 15px; width: 100%; max-width: 300px; }
        .btn { padding: 18px; border-radius: 14px; border: none; font-weight: 900; cursor: pointer; text-transform: uppercase; transition: 0.3s; font-size: 0.85rem; letter-spacing: 1px; }
        .btn-primary { background: var(--green); color: #000; box-shadow: 0 10px 30px rgba(46, 204, 113, 0.1); }
        .btn-secondary { background: transparent; border: 1px solid #222; color: #666; }
        .btn-airdrop { background: linear-gradient(90deg, var(--pink), #8e44ad); color: white; box-shadow: 0 0 20px rgba(255,105,180,0.2); }

        @media (max-width: 600px) { .terminal { display: none; } h1 { font-size: 3.8rem; } .live-counter { width: 90%; text-align: center; } }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>
    <nav>
        <a href="#" class="logo">ETHIC</a>
        <div class="nav-links">
            <a href="#" class="nav-item active" data-text="Ecosystem" onclick="setActive(this)">Ecosystem</a>
            <a href="#" class="nav-item" data-text="Network" onclick="setActive(this)">Network</a>
            <a href="#" class="nav-item" data-text="Governance" onclick="setActive(this)">Governance</a>
        </div>
    </nav>

    <div class="container">
        <h1 data-text="ETHIC">ETHIC</h1>
        <div class="tagline">Data Sovereignty Engine</div>
        <div class="btn-container">
            <button id="walletBtn" class="btn btn-primary" onclick="connectWallet()">Connect Wallet</button>
            <button id="airdropBtn" class="btn btn-airdrop" onclick="joinWaitlist()">Genesis Waitlist</button>
        </div>
    </div>

    <div class="terminal" id="terminal"></div>

    <div class="live-counter">
        <span class="dot"></span> Ethical Data: <span id="dataCount">1,240,582</span> GB
    </div>

    <div class="social-dock">
        <a href="https://t.me/ethicprotocol" target="_blank" class="social-icon"><i class="fab fa-telegram-plane"></i></a>
        <a href="https://x.com/ethicprotocol" target="_blank" class="social-icon"><i class="fab fa-x-twitter"></i></a>
    </div>

    <script>
        function setActive(element) { document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active')); element.classList.add('active'); }
        
        // 📟 TERMİNAL SİMÜLASYONU
        function startTerminal() {
            const term = document.getElementById('terminal');
            const msgs = ["SYNCING NODE...", "TX_ID: 0x8a2f", "ZK_PROOF: PASS", "REWARD: 0.45 ETHIC", "ENCRYPTING...", "DATA_SOV: ACTIVE"];
            setInterval(() => {
                const line = document.createElement('span');
                line.textContent = msgs[Math.floor(Math.random() * msgs.length)];
                term.prepend(line);
                if(term.children.length > 7) term.lastChild.remove();
            }, 1200);
        }
        startTerminal();

        // 🌌 PARÇACIK EFEKTİ (BAĞLANTILAR)
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        let particles = [];
        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = (Math.random() - 0.5) * 0.5;
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                if(this.x < 0 || this.x > canvas.width) this.vx *= -1;
                if(this.y < 0 || this.y > canvas.height) this.vy *= -1;
            }
            draw() {
                ctx.fillStyle = 'rgba(46, 204, 113, 0.2)';
                ctx.beginPath(); ctx.arc(this.x, this.y, 1.5, 0, Math.PI * 2); ctx.fill();
            }
        }
        function init() { for(let i=0; i<60; i++) particles.push(new Particle()); }
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        init(); animate();

        async function connectWallet() {
            if (window.ethereum) {
                const acc = await window.ethereum.request({ method: 'eth_requestAccounts' });
                document.getElementById('walletBtn').innerText = acc[0].substring(0,6)+"..."+acc[0].slice(-4);
                localStorage.setItem('wallet', acc[0]);
            }
        }

        function joinWaitlist() {
            const w = localStorage.getItem('wallet');
            if(!w) alert("Connect Wallet First!");
            else alert("Genesis Entry Confirmed!");
        }

        let count = 1240582;
        setInterval(() => {
            count += Math.floor(Math.random() * 5);
            document.getElementById('dataCount').innerText = count.toLocaleString();
        }, 2000);
    </script>
</body>
</html>
