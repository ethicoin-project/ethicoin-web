<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETHIC | Fair Data Ownership Protocol</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #030508;
            --green: #2ecc71;
            --pink: #ff69b4;
            --text-dim: #666;
            --neon-green-shadow: 0 0 10px rgba(46, 204, 113, 0.8);
            --neon-pink-shadow: 0 0 10px rgba(255, 105, 180, 0.8);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { 
            width: 100%; height: 100%; 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg); 
            color: white; overflow: hidden;
        }

        .glow-layer {
            position: fixed; inset: 0; z-index: -1;
            background: 
                radial-gradient(circle at 10% 40%, rgba(255, 105, 180, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 40%, rgba(46, 204, 113, 0.1) 0%, transparent 40%);
        }

        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 30px 60px; position: fixed; width: 100%; top: 0; z-index: 100;
        }
        
        /* 🧠 YENİ LOGO: BEYİN + PARMAK İZİ KARIŞIMI */
        .logo-section { display: flex; align-items: center; gap: 12px; }
        .logo-icon {
            width: 40px; height: 40px; border: 1.5px solid var(--pink);
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 15px var(--pink);
            position: relative;
        }
        .logo-icon i.fa-brain { font-size: 0.8rem; position: absolute; color: var(--green); opacity: 0.7; }
        .logo-icon i.fa-fingerprint { font-size: 1.1rem; color: var(--pink); }

        .logo-text { font-weight: 900; font-size: 1.6rem; letter-spacing: 2px; }

        /* 🟢 SAĞ ÜST NAV: YEŞİL -> PEMBE GEÇİŞİ */
        .nav-links { display: flex; gap: 40px; }
        .nav-item { 
            color: var(--green); 
            text-shadow: var(--neon-green-shadow);
            text-decoration: none; font-size: 0.85rem; 
            font-weight: 700; text-transform: capitalize; transition: 0.3s;
        }
        .nav-item:hover { opacity: 0.8; }
        .nav-item.active { 
            color: var(--pink); 
            text-shadow: var(--neon-pink-shadow);
            position: relative; 
        }
        .nav-item.active::after {
            content: ''; position: absolute; bottom: -12px; left: 0; 
            width: 100%; height: 2px; background: var(--pink);
            box-shadow: 0 0 15px var(--pink);
        }

        .hero {
            height: 100vh; display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center;
        }

        /* 🛡️ MERKEZİ GÖRSEL */
        .visual-core {
            position: relative; width: 500px; height: 350px;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: -40px;
        }
        .shield-neon {
            width: 120px; height: 150px; border: 2px solid var(--green);
            clip-path: polygon(50% 0%, 100% 20%, 100% 80%, 50% 100%, 0% 80%, 0% 20%);
            box-shadow: 0 0 40px rgba(46, 204, 113, 0.4);
            background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center;
            z-index: 5;
        }
        .brain-glow {
            position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(255,105,180,0.1) 0%, transparent 70%);
            filter: blur(30px); z-index: 1;
        }

        /* ✨ ETHIC YAZISI: IŞIKLI GEÇİŞ */
        h1 { 
            font-size: 8.5rem; font-weight: 900; letter-spacing: -8px; 
            line-height: 0.8; margin-bottom: 10px;
            background: linear-gradient(90deg, #2ecc71, #fff, #ff69b4, #2ecc71);
            background-size: 200% auto;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: shine 4s linear infinite;
        }
        @keyframes shine {
            to { background-position: 200% center; }
        }

        /* 🌈 PROTOCOL YAZISI: PEMBE-YEŞİL NEON */
        .sub-text { 
            font-size: 1.1rem; 
            font-weight: 700;
            letter-spacing: 2px; 
            margin-bottom: 40px;
            color: #fff;
            text-shadow: 0 0 5px var(--green), 0 0 10px var(--pink);
            animation: neonPulse 3s infinite alternate;
        }
        @keyframes neonPulse {
            from { text-shadow: 0 0 5px var(--green), 0 0 10px var(--pink); }
            to { text-shadow: 0 0 15px var(--pink), 0 0 20px var(--green); }
