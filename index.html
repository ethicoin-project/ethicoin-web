<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETHIC | Intelligence Protocol</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0b0e11; --green: #2ecc71; --pink: #ff69b4; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Inter', sans-serif; background: var(--bg); }
        #bg-video { position: fixed; right: 0; bottom: 0; min-width: 100%; min-height: 100%; z-index: -1; object-fit: cover; filter: brightness(0.35) contrast(1.1); }
        .content { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        h1 { font-size: clamp(3.5rem, 15vw, 7rem); background: linear-gradient(135deg, var(--green), var(--pink)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0; font-weight: 900; letter-spacing: -4px; }
        .btn-container { margin-top: 40px; display: flex; flex-direction: column; gap: 15px; width: 85%; max-width: 300px; }
        .btn { padding: 18px; border-radius: 14px; border: none; font-weight: 700; font-size: 1rem; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .btn-primary { background: var(--green); color: #000; }
        .btn-secondary { background: rgba(255, 255, 255, 0.05); border: 1px solid var(--pink); color: var(--pink); backdrop-filter: blur(10px); }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline id="bg-video">
        <source src="background.mp4" type="video/mp4">
    </video>

    <div class="content">
        <h1>ETHIC</h1>
        <div style="color: #888; letter-spacing: 5px; text-transform: uppercase; margin-top: 10px;">Ethical Human Intelligence</div>
        <div class="btn-container">
            <button class="btn btn-primary" onclick="connect()">Connect Wallet</button>
            <button class="btn btn-secondary" onclick="alert('Manifesto is loading...')">The Manifesto</button>
        </div>
    </div>

    <script>
        async function connect() {
            if (window.ethereum) {
                const accs = await window.ethereum.request({ method: 'eth_requestAccounts' });
                alert("Connected: " + accs[0]);
            } else { alert("Please use MetaMask Browser!"); }
        }
    </script>
</body>
</html>
