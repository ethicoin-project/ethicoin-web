<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETHIC | Fair Data Ownership Protocol</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0b0e11; --green: #2ecc71; --pink: #ff69b4; --text: #a0a0a0; }
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        body, html { width: 100%; height: 100%; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }

        /* 🚀 NAV & SEARCH (DENGELENMİŞ) */
        nav { 
            display: flex; flex-direction: column; align-items: center; 
            padding: 15px 5%; position: fixed; width: 100%; top: 0; 
            backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.05); z-index: 1000; 
        }

        .nav-top { display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 1200px; margin-bottom: 10px; }
        .logo { font-weight: 900; font-size: 1.2rem; letter-spacing: 2px; color: var(--green); text-decoration: none; }
        
        /* 🔍 ARAMA ÇUBUĞU */
        .search-container { width: 100%; max-width: 500px; position: relative; margin: 5px 0; }
        .search-input { width: 100%; background: rgba(255,255,255,0.03); border: 1px solid #333; border-radius: 12px; padding: 10px 45px; color: white; font-size: 0.85rem; text-align: center; }
        .search-icon { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: #555; }

        /* 🔗 ÜST YAZILAR (ORTALANMIŞ & KISALTILMAMIŞ) */
        .nav-links { display: flex; gap: 20px; justify-content: center; width: 100%; padding-top: 5px; }
        .nav-item { position: relative; color: #666; text-decoration: none; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; cursor: pointer; background: #666; -webkit-background-clip: text; -webkit-text-fill-color: transparent; white-space: nowrap; }
        .nav-item.active { color: var(--pink); background: var(--pink); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 5px var(--pink)); }
        
        /* ✨ IŞIK KAYMASI ✨ */
        .nav-item::after, h1::after { content: attr(data-text); position: absolute; left: 0; top: 0; width: 100%; height: 100%; background: linear-gradient(90deg, transparent 0%, transparent 40%, rgba(255, 255, 255, 0.4) 50%, transparent 60%, transparent 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-size: 200% 100%; background-position: -150% 0%; animation: lightScan 4s infinite linear; }
        @keyframes lightScan { 0% { background-position: -150% 0%; } 100% { background-position: 150% 0%; } }

        /* HERO SECTION */
        .container { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 160px 20px 100px 20px; background: radial-gradient(circle at center, #161b22 0%, #0b0e11 100%); }
        h1 { font-size: clamp(2.8rem, 12vw, 6.5rem); font-weight: 900; letter-spacing: -4px; line-height: 1; background: linear-gradient(135deg, var(--green), var(--pink)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; color: transparent; position: relative; }
        .tagline { color: #666; font-size: 0.85rem; margin-top: 20px; letter-spacing: 5px; text-transform: uppercase; font-weight: 600; }

        /* 🟢 CANLI SAYAÇ (MOBİLDE DENGELENDİ) */
        .live-counter { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); padding: 10px 25px; border-radius: 50px; border: 1px solid rgba(46, 204, 113, 0.2); font-size: 0.7rem; color: var(--green); backdrop-filter: blur(15px); z-index: 100; white-space: nowrap; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .dot { height: 8px; width: 8px; background-color: var(--green); border-radius: 50%; display: inline-block; margin-right: 10px; animation: blink 1.2s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(0.8); } }

        /* 📱 MOBİL ÖZEL FIXLER */
        @media (max-width: 600px) {
            nav { padding: 10px 5%; }
            .nav-top { justify-content: center; }
            .nav-links { gap: 15px; overflow-x: auto; padding-bottom: 5px; -webkit-overflow-scrolling: touch; }
            .nav-links::-webkit-scrollbar { display: none; } /* Kaydırma çubuğunu gizle */
            .nav-item { font-size: 0.65rem; }
            .search-input { font-size: 0.8rem; padding: 8px 30px; }
            h1 { font-size: 3.2rem; }
            .tagline { font-size: 0.7rem; letter-spacing: 3px; }
            .social-dock { bottom: 80px; right: 20px; flex-direction: column; gap: 10px; }
            .live-counter { width: 90%; text-align: center; bottom: 15px; }
        }

        /* MODALLAR & BUTONLAR (KORUNANLAR) */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); backdrop-filter: blur(25px); overflow-y: auto; padding: 20px; }
        .modal-content { background: #0b0e11; margin: 40px auto; padding: 30px; border: 1px solid #222; width: 100%; max-width: 700px; border-radius: 25px; border-top: 4px solid var(--green); }
        .social-dock { position: fixed; bottom: 30px; right: 30px; display: flex; gap: 15px; z-index: 100; }
        .social-icon { width: 45px; height: 45px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; text-decoration: none; transition: 0.3s; }
        .btn-container { margin-top: 40px; display: flex; flex-direction: column; gap: 15px; width: 100%; max-width: 300px; }
        .btn { padding: 18px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; text-transform: uppercase; transition: 0.3s; font-size: 0.85rem; }
        .btn-primary { background: var(--green); color: #000; }
        .btn-secondary { background: transparent; border: 1px solid #333; color: #888; }
        .btn-airdrop { background: linear-gradient(90deg, var(--pink), #8e44ad); color: white; }
    </style>
</head>
<body>

    <nav>
        <div class="nav-top">
            <a href="#" class="logo">ETHIC</a>
        </div>
        
        <div class="search-container">
            <i class="fas fa-search search-icon"></i>
            <input type="text" id="aiSearch" class="search-input" placeholder="Ask AI..." onkeydown="if(event.key==='Enter') askAI()">
        </div>

        <div class="nav-links">
            <a href="#" class="nav-item active" data-text="Ecosystem" onclick="setActive(this)">Ecosystem</a>
            <a href="#" class="nav-item" data-text="Network" onclick="setActive(this)">Network</a>
            <a href="#" class="nav-item" data-text="Governance" onclick="setActive(this)">Governance</a>
        </div>
    </nav>

    <div class="container">
        <h1 data-text="ETHIC">ETHIC</h1>
        <div class="tagline">Fair Data Ownership Protocol</div>
        
        <div class="btn-container">
            <button id="walletBtn" class="btn btn-primary" onclick="connectWallet()">Connect Wallet</button>
            <button class="btn btn-secondary" onclick="openWP()">Protocol Specs</button>
            <button id="airdropBtn" class="btn btn-airdrop" onclick="joinWaitlist()">Join Genesis Waitlist</button>
        </div>
    </div>

    <div class="live-counter">
        <span class="dot"></span> Protocol Data: <span id="dataCount">1,240,582</span> GB
    </div>

    <div class="social-dock">
        <a href="https://t.me/ethicprotocol" target="_blank" class="social-icon"><i class="fab fa-telegram-plane"></i></a>
        <a href="https://x.com/ethicprotocol" target="_blank" class="social-icon"><i class="fab fa-x-twitter"></i></a>
    </div>

    <div id="wpModal" class="modal">
        <div class="modal-content">
            <h2 style="color:var(--green); text-align:center; font-weight:900;">⚖️ WHITE PAPER V1.0</h2>
            <div style="color:#eee; line-height:1.6; margin-top:20px; font-size:0.9rem;">
                ETHIC is building the first decentralized layer for human digital footprints.
                <br><br>
                <strong>Allocation:</strong> 50% Community Rewards, 10% Team (2Y Vesting), 15% Liquidity.
            </div>
            <button class="btn btn-primary" style="width:100%; margin-top:30px;" onclick="closeWP()">BACK</button>
        </div>
    </div>

    <div id="aiModal" class="modal">
        <div class="modal-content">
            <h2 style="color:var(--pink)">AI RESPONSE</h2>
            <p id="aiResponseText" style="margin-top:20px; line-height:1.6; color:#ccc;"></p>
            <button class="btn btn-primary" style="width:100%; margin-top:30px;" onclick="closeAI()">CLOSE</button>
        </div>
    </div>

    <script>
        function setActive(element) { document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active')); element.classList.add('active'); }
        function openWP() { document.getElementById("wpModal").style.display = "block"; }
        function closeWP() { document.getElementById("wpModal").style.display = "none"; }
        function closeAI() { document.getElementById("aiModal").style.display = "none"; }

        function askAI() {
            const modal = document.getElementById('aiModal');
            const text = document.getElementById('aiResponseText');
            modal.style.display = 'block';
            text.innerHTML = "ETHIC AI is calculating... Verified: Digital data sovereignty is the core of our protocol.";
        }

        async function connectWallet() {
            if (window.ethereum) {
                const acc = await window.ethereum.request({ method: 'eth_requestAccounts' });
                document.getElementById('walletBtn').innerText = acc[0].substring(0,6)+"..."+acc[0].slice(-4);
                localStorage.setItem('wallet', acc[0]);
            }
        }

        function joinWaitlist() {
            const w = localStorage.getItem('wallet');
            if(!w) { alert("Connect wallet first!"); }
            else { alert("Wallet " + w.substring(0,6) + "... registered for Genesis!"); }
        }

        let count = 1240582;
        setInterval(() => {
            count += Math.floor(Math.random() * 5);
            document.getElementById('dataCount').innerText = count.toLocaleString();
        }, 2000);
    </script>
</body>
</html>
