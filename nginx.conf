# ════════════════════════════════════════════════════════════════
# ETHICOIN Nginx Configuration
# Domain: ethicoin.biz
# ════════════════════════════════════════════════════════════════

# HTTP to HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name ethicoin.biz www.ethicoin.biz;
    return 301 https://ethicoin.biz$request_uri;
}

# Redirect www to non-www (HTTPS)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.ethicoin.biz;

    ssl_certificate /etc/letsencrypt/live/ethicoin.biz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ethicoin.biz/privkey.pem;

    return 301 https://ethicoin.biz$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ethicoin.biz;

    root /var/www/ethicoin;
    index index.html;

    # ── SSL Configuration ────────────────────────────────────────
    ssl_certificate /etc/letsencrypt/live/ethicoin.biz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ethicoin.biz/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/ethicoin.biz/chain.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # ── Security Headers ─────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://browser.sentry-cdn.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://www.google-analytics.com https://base.blockscout.com https://mainnet.base.org https://api.dexscreener.com https://sentry.io https://o0.ingest.sentry.io; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    # ── Gzip Compression ─────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # ── Static Asset Caching ─────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Cache webmanifest and robots
    location ~* \.(webmanifest|txt|xml)$ {
        expires 1d;
        add_header Cache-Control "public";
    }

    # ── HTML — No Cache ──────────────────────────────────────────
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # ── Main Location ────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── Let's Encrypt ACME Challenge ─────────────────────────────
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # ── Block Sensitive Paths ────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Access & Error Logs ──────────────────────────────────────
    access_log /var/log/nginx/ethicoin.access.log;
    error_log /var/log/nginx/ethicoin.error.log;
}
